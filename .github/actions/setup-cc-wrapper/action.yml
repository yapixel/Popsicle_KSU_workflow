name: Setup cc-wrapper for Clang version spoofing
description: Creates a wrapper script that fakes clang --version output (only if needed)

inputs:
  workdir:
    description: Path to kernel/common directory
    required: true
    default: kernel_workspace/common
  clang_dir:
    description: Path to extracted Clang directory
    required: true
    default: kernel_workspace/clang

runs:
  using: composite
  steps:
    - name: Check clang version and create wrapper if needed
      shell: bash
      run: |
        cd "${{ inputs.workdir }}"
        
        # 用完整路径调用 Clang
        REAL_CLANG="${{ inputs.clang_dir }}/bin/clang"
        REAL_VERSION=$("$REAL_CLANG" --version | head -1 | grep -oP 'clang version \K[0-9]+\.[0-9]+\.[0-9]+' | head -1)
        TARGET_VERSION="20.0.0"
        
        echo "Current clang version: $REAL_VERSION"
        echo "Target clang version: $TARGET_VERSION"
        
        if [ "$REAL_VERSION" = "$TARGET_VERSION" ]; then
          echo "Clang version is $TARGET_VERSION, creating wrapper to filter /mnt/ paths from -v output"
          {
            echo '#!/bin/bash'
            echo "REAL_CLANG=$REAL_CLANG"
            echo 'if [[ "$*" == *"-v"* ]]; then'
            echo "    \$REAL_CLANG -v 2>&1 | sed 's|/mnt/disks/build-disk/src/android/llvm-r[^)]*||g'"
            echo '    exit 0'
            echo 'fi'
            echo "exec \$REAL_CLANG \"\$@\""
          } > cc-wrapper
        else
          echo "Clang version is $REAL_VERSION, no wrapper filtering needed"
          {
            echo '#!/bin/bash'
            echo "exec $REAL_CLANG \"\$@\""
          } > cc-wrapper
        fi
        
        chmod +x cc-wrapper
