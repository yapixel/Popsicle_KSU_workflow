name: Setup cc-wrapper for Clang version spoofing
description: Creates a wrapper script that fakes clang --version output (only if needed)

inputs:
  workdir:
    description: Path to kernel/common directory
    required: true
    default: kernel_workspace/common
  clang_dir:
    description: Path to extracted Clang directory
    required: true
    default: kernel_workspace/clang

runs:
  using: composite
  steps:
    - name: Check clang version and create wrapper if needed
      shell: bash
      run: |
        cd "${{ inputs.workdir }}"
        
        # 用完整路径调用 Clang
        REAL_VERSION=$("${{ inputs.clang_dir }}/bin/clang" --version | head -1 | grep -oP 'clang version \K[0-9]+\.[0-9]+\.[0-9]+' | head -1)
        TARGET_VERSION="19.0.1"
        
        echo "Current clang version: $REAL_VERSION"
        echo "Target clang version: $TARGET_VERSION"
        
        if [ "$REAL_VERSION" = "$TARGET_VERSION" ]; then
          echo "Clang version matches, no wrapper needed"
          {
            echo '#!/bin/bash'
            echo 'exec clang "$@"'
          } > cc-wrapper
        else
          echo "Clang version mismatch, creating wrapper to spoof as $TARGET_VERSION"
          {
            echo '#!/bin/bash'
            echo 'if [[ "$*" == *"--version"* ]]; then'
            echo '    echo "Android (14043575, +pgo, +bolt, +lto, +mlgo, based on r536225) clang version 19.0.1 (https://android.googlesource.com/toolchain/llvm-project b3a530ec6537146650e42be89f1089e9a3588460)"'
            echo '    exit 0'
            echo 'fi'
            echo 'exec clang "$@"'
          } > cc-wrapper
        fi
        
        chmod +x cc-wrapper
