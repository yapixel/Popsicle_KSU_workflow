name: Module Build KowSU (Expert Hybrid Mode)

on:
  workflow_call:
    inputs:
      sub_level:
        required: true
        type: string

jobs:
  build:
    name: KowSU 6.12.${{ inputs.sub_level }}
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      ANDROID_VERSION: 'android16'
      KERNEL_VERSION: '6.12'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Disk Space & Install Dependencies
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            binutils python-is-python3 libssl-dev libelf-dev libdw-dev \
            curl bison flex make git perl gcc bc zip unzip aria2 xz-utils

      - name: Initialize Workspace & Full Toolchains
        run: |
          mkdir -p kernel_workspace && cd kernel_workspace
          
          # 1. 下载内核源码
          aria2c -s16 -x16 -k1M "https://github.com/MidoriKSU/dami-kernel-build/releases/download/0/android16-6.12-2025-06.tar.gz" -o common.tar.gz
          mkdir -p common && tar -xzf common.tar.gz -C common && rm common.tar.gz
          
          # 2. 下载 Clang 23
          aria2c -s16 -x16 -k1M "https://github.com/MidoriKSU/dami-kernel-build/releases/download/0/Clang-23.0.0git-20260130.tar.gz" -o clang23.tar.gz
          mkdir -p clang23 && tar -xzf clang23.tar.gz -C clang23 && rm clang23.tar.gz
          
          # 3. 下载 AOSP Build-Tools
          aria2c -s16 -x16 -k1M "https://github.com/MidoriKSU/dami-kernel-build/releases/download/0/build-tools.zip" -o build-tools.zip
          unzip -q build-tools.zip && rm build-tools.zip
          
          # 4. 下载 ARM GNU Toolchain 15.2 (64位)
          aria2c -s16 -x16 -k1M "https://github.com/MidoriKSU/dami-kernel-build/releases/download/0/arm-gnu-toolchain-15.2.rel1-x86_64-aarch64-none-linux-gnu.tar.xz" -o gcc64.tar.xz
          mkdir -p gcc64 && tar -xJf gcc64.tar.xz --strip-components=1 -C gcc64 && rm gcc64.tar.xz

          # 5. 下载 ARM GNU Toolchain 15.2 (32位/Bare Metal)
          aria2c -s16 -x16 -k1M "https://github.com/MidoriKSU/dami-kernel-build/releases/download/0/arm-gnu-toolchain-15.2.rel1-x86_64-arm-none-eabi.tar.xz" -o gcc32.tar.xz
          mkdir -p gcc32 && tar -xJf gcc32.tar.xz --strip-components=1 -C gcc32 && rm gcc32.tar.xz
          
          # 权限补全 (已彻底移除 rust)
          chmod -R +x clang23/bin/ build-tools/bin/ gcc64/bin/ gcc32/bin/
          sed -i 's/ -dirty//g' common/scripts/setlocalversion

      - name: Setup KowSU (Standard Sync)
        run: |
          cd kernel_workspace/common
          git clone --depth=1 --branch=master https://github.com/KOWX712/KernelSU.git KernelSU
          ln -sf ../KernelSU/kernel drivers/kernelsu
          grep -q "kernelsu" drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          grep -q "kernelsu" drivers/Kconfig || sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          cp -r KernelSU/uapi KernelSU/kernel/uapi 2>/dev/null || true
          echo 'ccflags-y += -I$(srctree)/drivers/kernelsu' >> drivers/kernelsu/Makefile
          mkdir -p include/uapi
          cp -f KernelSU/kernel/policy/*.h include/uapi/ 2>/dev/null || true
          cp -f KernelSU/kernel/policy/*.h include/ 2>/dev/null || true
          cp -f KernelSU/kernel/include/*.h include/ 2>/dev/null || true
          cp -f KernelSU/kernel/uapi/*.h include/uapi/ 2>/dev/null || true

      - name: Apply KMI Bypass
        run: |
          cd kernel_workspace/common
          sed -i '/bad_version:/,/^}/ s/return 0;/return 1;/' kernel/module/version.c

      - name: Inject Defconfig Flags
        uses: ./.github/actions/kernel-config
        with:
          defconfig_path: "kernel_workspace/common/arch/arm64/configs/gki_defconfig"
          build_config_path: "kernel_workspace/common/build.config.gki"
          variant: "kowsu"
          enable_susfs: "false"

      - name: Compile Kernel (Pure C/C++ Hybrid Mode)
        run: |
          WORKDIR="$(pwd)"
          cd kernel_workspace/common
          
          # 核心路径优先级设置
          export PATH="$WORKDIR/kernel_workspace/clang23/bin:$WORKDIR/kernel_workspace/gcc64/bin:$WORKDIR/kernel_workspace/gcc32/bin:$WORKDIR/kernel_workspace/build-tools/bin:$PATH"

          # 身份欺骗包装器
          cat > cc-wrapper <<-EOF
          #!/bin/bash
          if [[ "\$*" == *"--version"* ]]; then
              echo "Android (14043575, +pgo, +bolt, +lto, +mlgo, based on r536225) clang version 19.0.1 (https://android.googlesource.com/toolchain/llvm-project b3a530ec6537146650e42be89f1089e9a3588460), LLD 19.0.1"
              exit 0
          fi
          exec "$WORKDIR/kernel_workspace/clang23/bin/clang" "\$@"
          EOF
          chmod +x cc-wrapper

          # 编译变量全覆盖
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export CC="$(pwd)/cc-wrapper"
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export READELF=llvm-readelf
          export STRIP=llvm-strip
          export HOSTCC="$(pwd)/cc-wrapper"
          export HOSTCXX="$WORKDIR/kernel_workspace/clang23/bin/clang++"
          export HOSTLD=ld.lld
          export HOSTAR=llvm-ar
          
          # 定制 GNU 15.2 工具链前缀
          export CROSS_COMPILE=aarch64-none-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-none-eabi-
          export CLANG_TRIPLE=aarch64-none-linux-gnu-

          # 🌟 屏蔽 Clang 23 严格未初始化警告，拯救 typecheck 宏
          export KCFLAGS="-Wno-default-const-init-var-unsafe"

          # 编译元数据硬编码
          export KBUILD_BUILD_USER="kleaf"
          export KBUILD_BUILD_HOST="build-host"
          export KBUILD_BUILD_TIMESTAMP="Fri Sep 12 04:57:41 UTC 2025"

          # 1. 生成基础配置 (带全套变量)
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC="$CC" HOSTCC="$HOSTCC" CROSS_COMPILE="$CROSS_COMPILE" gki_defconfig

          # 2. 🔪 强制禁用 Rust (绕过 bindgen 解析报错)
          scripts/config --file out/.config -d CONFIG_RUST
          scripts/config --file out/.config -d CONFIG_RUST_BLK
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig

          # 3. 暴力覆写编译 (纯 C/C++ 架构)
          make -j$(nproc --all) O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 \
            CC="$CC" LD="$LD" AR="$AR" NM="$NM" OBJCOPY="$OBJCOPY" OBJDUMP="$OBJDUMP" \
            READELF="$READELF" STRIP="$STRIP" HOSTCC="$HOSTCC" HOSTCXX="$HOSTCXX" \
            HOSTLD="$HOSTLD" HOSTAR="$HOSTAR" CLANG_TRIPLE="$CLANG_TRIPLE" \
            CROSS_COMPILE="$CROSS_COMPILE" CROSS_COMPILE_COMPAT="$CROSS_COMPILE_COMPAT" \
            Image

      - name: Package & Final Check
        run: |
          cd kernel_workspace
          IMAGE="./common/out/arch/arm64/boot/Image"
          if [ ! -f "$IMAGE" ]; then echo "Kernel build failed!"; exit 1; fi

          git clone https://github.com/yapixel/AnyKernel3 --depth=1
          cp "$IMAGE" ./AnyKernel3/
          cd AnyKernel3
          ZIP_NAME="kowsu_popsicle_6.12_norust_15.2-$(date +'%y%m%d').zip"
          zip -r9 "../$ZIP_NAME" *
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-kowsu-norust
          path: kernel_workspace/${{ env.ZIP_NAME }}
