name: (New Xiaomi/OPPO-OnePlus-Realme Universal) 6.12.69 GKI Kernel

env:
  TZ: Asia/Shanghai
  ANDROID_VERSION: 'android16'
  KERNEL_VERSION: '6.12'
  SUB_VERSION: '69'
  KERNEL_NAME: 'android16-5-ga8f88ad96df3-ab13929693-4k'

on:
  workflow_dispatch:
    inputs:
      ksu_type:
        description: 'KernelSU variant (ReSukiSU / KSU (upstream) / No built-in KSU)'
        required: true
        type: choice
        default: 'resukisu'
        options:
          - 'resukisu'
          - 'ksu'
          - 'none'
      susfs_enable:
        description: 'Enable SuSFS (enhances mount hiding)'
        required: true
        type: boolean
        default: true
      kernel_suffix:
        description: 'Kernel suffix (leave blank for default)'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      ksuver: ${{ steps.ksu_version.outputs.ksuver }}
      ak3name: ${{ steps.create_zip.outputs.ak3name }}
    permissions:
      contents: read
    steps:
      - name: Install dependencies + initialize source repo
        run: |
          rm -rf kernel_workspace && mkdir kernel_workspace && cd kernel_workspace
          sudo apt-get update && sudo apt-get install -y --no-install-recommends \
            binutils python-is-python3 libssl-dev libelf-dev libdw-dev aria2 zip unzip
          
          echo "Cloning AOSP 16-6.12 source..."
          aria2c -s16 -x16 -k1M https://android.googlesource.com/kernel/common/+archive/refs/heads/android16-6.12-2026-03.tar.gz -o common.tar.gz
          mkdir common && tar -xzf common.tar.gz -C common && rm common.tar.gz &

          echo "Cloning Toolchains (Clang 19, Rust 1.82.0)..."
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/clang-r536225.zip -o clang.zip
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/rust.zip -o rust.zip
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/build-tools.zip -o build-tools.zip
          
          wait
          unzip -q clang.zip -d clang19 && unzip -q rust.zip -d rust && unzip -q build-tools.zip
          rm *.zip
          
          # Strip -dirty
          find common/scripts -name setlocalversion -exec sed -i 's/ -dirty//g' {} +

      - name: Add KernelSU
        id: ksu_version
        run: |
          cd kernel_workspace
          if [[ ${{ github.event.inputs.ksu_type }} == "resukisu" ]]; then
            curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/refs/heads/main/kernel/setup.sh" | bash -s main
            echo 'CONFIG_KSU_FULL_NAME_FORMAT="%TAG_NAME%-%COMMIT_SHA%@cctv18"' >> ./common/arch/arm64/configs/gki_defconfig
            cd ./KernelSU
            KSU_VERSION=$(expr $(git rev-list --count main) + 30700 2>/dev/null || echo 114514)
          elif [[ ${{ github.event.inputs.ksu_type }} == "ksu" ]]; then
            curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/refs/heads/main/kernel/setup.sh" | bash -s main
            cd ./KernelSU
            KSU_VERSION=$(expr $(curl -sI "https://api.github.com/repos/tiann/KernelSU/commits?sha=main&per_page=1" | grep -i "link:" | sed -n 's/.*page=\([0-9]*\)>; rel="last".*/\1/p') "+" 30000)
            sed -i "s/DKSU_VERSION=16/DKSU_VERSION=${KSU_VERSION}/" kernel/Kbuild
          fi
          echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
          echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT

      - name: Apply SuSFS patches
        if: github.event.inputs.susfs_enable == 'true'
        run: |
          cd kernel_workspace
          git clone --depth=1 https://github.com/cctv18/susfs4oki.git susfs4ksu -b oki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}
          cp ./susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch ./common/
          cp ./susfs4ksu/kernel_patches/fs/* ./common/fs/
          cp ./susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
          cd ./common && patch -p1 < 50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch || true
          cd ..
          if [[ ${{ github.event.inputs.ksu_type }} == "ksu" ]]; then
            cp ./susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ./KernelSU/
            cd ./KernelSU && patch -p1 < 10_enable_susfs_for_ksu.patch || true
          fi

      - name: Configure Kernel (Defconfig)
        run: |
          cd kernel_workspace
          {
            echo "CONFIG_KSU=y"
            if [[ "${{ github.event.inputs.susfs_enable }}" == "true" ]]; then
              echo "CONFIG_KSU_SUSFS=y"
              echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y"
              echo "CONFIG_KSU_SUSFS_SUS_PATH=y"
              echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y"
              echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y"
              echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y"
              echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y"
              echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y"
              echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y"
              echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y"
              echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y"
              echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y"
              echo "CONFIG_KSU_SUSFS_SUS_MAP=y"
            fi
            echo "CONFIG_TMPFS_XATTR=y"
            echo "CONFIG_TMPFS_POSIX_ACL=y"
            echo "CONFIG_RUST=y"
            echo "CONFIG_ANDROID_BINDER_IPC_RUST=m"
            echo "CONFIG_IP_SET=y"
            echo "CONFIG_TCP_CONG_ADVANCED=y"
            echo "CONFIG_TCP_CONG_BBR=y"
            echo "CONFIG_TCP_CONG_BRUTAL=y"
            echo "CONFIG_DEFAULT_TCP_CONG=\"cubic\""
          } >> ./common/arch/arm64/configs/gki_defconfig
          sed -i 's/check_defconfig//' ./common/build.config.gki

      - name: Build Kernel
        run: |
          WORKDIR="$(pwd)"
          export PATH="$WORKDIR/kernel_workspace/clang19/bin:$WORKDIR/kernel_workspace/build-tools/bin:$WORKDIR/kernel_workspace/rust/bin:$PATH"
          export LIBCLANG_PATH="$WORKDIR/kernel_workspace/clang19/lib"
          
          cd kernel_workspace/common
          
          # Setup remapping for Rust vs C compatibility
          COMMON_REAL_PATH=$(pwd -P)
          ROOT_REAL_PATH=$(dirname "$COMMON_REAL_PATH")
          
          # C Flags
          KCFLAGS="-fdebug-prefix-map=$ROOT_REAL_PATH=. -fmacro-prefix-map=$ROOT_REAL_PATH=. -ffile-prefix-map=$ROOT_REAL_PATH=."
          KCFLAGS+=" -no-canonical-prefixes -O2 -pipe -Wno-error -fno-stack-protector -D__ANDROID_COMMON_KERNEL__"
          export KCFLAGS
          
          # Rust Flags (Crucial fix for your error)
          export KRUSTFLAGS="--remap-path-prefix=$ROOT_REAL_PATH=."

          # Time Hijack Preload
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/lib/libfakestat.so -O libfakestat.so || touch libfakestat.so
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/lib/libfaketimeMT.so -O libfaketimeMT.so || touch libfaketimeMT.so
          chmod +x *.so
          
          # Build Execution
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- O=out gki_defconfig
          
          # Pass KRUSTFLAGS to make
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            CC="clang" LD="ld.lld" KRUSTFLAGS="$KRUSTFLAGS" O=out Image

      - name: Package AnyKernel3
        id: create_zip
        run: |
          cd kernel_workspace
          git clone https://github.com/cctv18/AnyKernel3 --depth=1
          cp common/out/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          suffix="${{ github.event.inputs.kernel_suffix }}"
          [[ -z "$suffix" ]] && suffix="${{ env.KERNEL_NAME }}"
          AK3_NAME="AnyKernel3_${{ github.event.inputs.ksu_type }}_${{ env.KSUVER }}_$suffix.zip"
          zip -r ../$AK3_NAME ./*
          echo "ak3name=$AK3_NAME" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.create_zip.outputs.ak3name }}
          path: kernel_workspace/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.ak3name }}
      
      - name: Create GH Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_id }}"
          files: "*.zip"
          body: "Automated GKI 6.12 Build with KernelSU and SuSFS."
