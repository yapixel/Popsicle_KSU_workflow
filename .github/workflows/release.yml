name: Release · Publish Artifacts

on:
  workflow_call:
    inputs:
      ksu_variant:
        required: true
        type: string
      sub_level:
        required: true
        type: string
      kernel_ver:
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: 🚀 Publish · ${{ inputs.kernel_ver }} · android16-6.12-2025-06_r58
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v6

      - name: Download Build Artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: 'kernel-*'
          path: release_zips
          merge-multiple: true

      - name: 📝 Compose Release Body
        run: |
          KV="${{ inputs.kernel_ver }}"

          cat <<RELEASE_BODY > release_body.md
          ## 📱 Popsicle GKI Kernel — \`${KV}\`
          > **Device:** Xiaomi Popsicle · SM8850 (Snapdragon 8 Elite)
          > **Android:** 16 · GKI \`${KV}\`
          > **Built:** \`$(date -u +'%Y-%m-%d %H:%M UTC')\`

          ---

          ### 🧩 Variant Shipped

          | Variant | KernelSU Source |
          |---------|----------------|
          | **xxKSU** | [backslashxx/KernelSU](https://github.com/backslashxx/KernelSU) |

          ---

          ### ✨ Features

          | Feature | Details |
          |---------|---------|
          | 🔒 Root Solution | KernelSU |
          | 🌐 Networking | BBR congestion control · IPSet suite |
          | 🔑 KMI | KMI bypass for extended module compatibility |
          | 📦 Format | AnyKernel3 flashable \`.zip\` |

          ---

          ### 📲 Installation

          1. Boot into a custom recovery (e.g. TWRP) **or** use a root-capable flasher
          2. Flash the \`.zip\` matching your desired variant
          3. Reboot and verify root via the KernelSU app

          > ⚠️ **Back up your current boot image before flashing.**
          > This kernel is provided as-is, without warranty of any kind.

          ---

          ### 🔗 References

          - [backslashxx/KernelSU](https://github.com/backslashxx/KernelSU)
          - [osm0sis/AnyKernel3](https://github.com/osm0sis/AnyKernel3)
          RELEASE_BODY

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: "android16-6.12-2025-06_r58"
          name: "🌟 Popsicle GKI ${{ inputs.kernel_ver }} · android16-6.12-2025-06_r58"
          body_path: release_body.md
          files: release_zips/*.zip
