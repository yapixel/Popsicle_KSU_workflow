name: Publish GitHub Release

on:
  workflow_call:
    inputs:
      release_tag:
        description: 'The YYMMDD tag to use for the release'
        required: true
        type: string
      # Note: gki_version and variant_input are now used for display in notes 
      # since the matrix handles the actual logic.
      gki_version:
        required: true
        type: string
      variant_input:
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    name: Generate Release & Notes
    runs-on: ubuntu-latest
    steps:
      - name: Download All Build Artifacts
        uses: actions/download-artifact@v4
        with:
          # This pattern matches 'kernel-kowsu-...' and 'kernel-xxksu-...'
          pattern: kernel-*
          path: release_zips
          merge-multiple: true

      - name: Generate Time Metadata
        id: time
        run: echo "time_fmt=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ inputs.release_tag }}"
          name: "GKI 6.12 Build — ${{ inputs.release_tag }}"
          generate_release_notes: true
          body: |
            ## Build Overview
            Multiple GKI artifacts have been generated for this release. Please select the `.zip` that matches your target **Sublevel** and **Security Patch**.

            | Component | Details |
            | :--- | :--- |
            | **Kernel Base** | Linux `6.12.y` (Android 16) |
            | **Requested Variant** | `${{ inputs.variant_input }}` |
            | **Requested Version** | `${{ inputs.gki_version }}` |
            | **Build Time** | ${{ steps.time.outputs.time_fmt }} (CST) |

            ## Contributors
            <div align="left">
              <a href="https://github.com/tiann"><img src="https://github.com/tiann.png" width="40" height="40" style="border-radius: 50%;" alt="tiann"></a>
              <a href="https://github.com/backslashxx"><img src="https://github.com/backslashxx.png" width="40" height="40" style="border-radius: 50%;" alt="backslashxx"></a>
              <a href="https://github.com/KOWX712"><img src="https://github.com/KOWX712.png" width="40" height="40" style="border-radius: 50%;" alt="KOWX712"></a>
              <a href="https://github.com/simonpunk"><img src="https://github.com/simonpunk.png" width="40" height="40" style="border-radius: 50%;" alt="simonpunk"></a>
              <a href="https://github.com/osm0sis"><img src="https://github.com/osm0sis.png" width="40" height="40" style="border-radius: 50%;" alt="osm0sis"></a>
            </div>

            ## Installation & Management
            ### 1. Flashing
            Flash via **TWRP/OrangeFox** or use [HorizonKernelFlasher](https://github.com/libxzr/HorizonKernelFlasher).

            ### 2. KernelSU Managers
            - **xxKSU:** [backslashxx/KernelSU](https://github.com/backslashxx/KernelSU/releases)
            - **KowSU:** [KOWX712/KernelSU](https://github.com/KOWX712/KernelSU/releases)

            ---
            > Built automatically via GitHub Actions — [run #${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          draft: false
          prerelease: false
          # This grabs every zip downloaded from the artifacts
          files: release_zips/*.zip
          
