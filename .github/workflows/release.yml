name: Release · Publish Artifacts

on:
  workflow_call:
    inputs:
      ksu_variant:
        required: true
        type: string
      sub_level:
        required: true
        type: string
      kernel_ver:
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Publish · ${{ inputs.kernel_ver }} · android16-6.12-2025-06_r58
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Download Build Artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: 'kernel-*'
          path: release_zips
          merge-multiple: true

      - name: Compose Release Body
        run: |
          KV="${{ inputs.kernel_ver }}"
          SUB="${{ inputs.sub_level }}"
          
          cat <<RELEASE_BODY > release_body.md
          # Popsicle GKI Kernel — android16-${KV}-2025-06_r58

          **Android 16 GKI kernel for Xiaomi Popsicle (SM8850 / Snapdragon 8 Elite)**

          > Built: $(date -u +'%Y-%m-%d %H:%M UTC') · Compiler: Clang 19.0.1 · LTO: Full

          ---

          ## Variant

          | KSU Type | Upstream |
          |----------|----------|
          | **xxKSU** | [backslashxx/KernelSU](https://github.com/backslashxx/KernelSU) |

          ---

          ## Technical Details

          | Item | Value |
          |------|-------|
          | Kernel | ${KV}.${SUB} |
          | Android | 16 |
          | KMI | Bypassed |
          | Congestion Control | BBR |
          | IPSet | Full suite |
          | Format | AnyKernel3 |

          ---

          ## Installation

          ```
          1. Reboot to recovery (TWRP recommended)
          2. Flash KSU_popsicle_*.zip
          3. Reboot and install KernelSU manager
          ```

          > Backup your current boot image before flashing. This build is provided as-is without warranty.

          ---

          ## Credits

          - [backslashxx/KernelSU](https://github.com/backslashxx/KernelSU)
          - [osm0sis/AnyKernel3](https://github.com/osm0sis/AnyKernel3)
          RELEASE_BODY

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: "android16-6.12-2025-06_r58"
          name: "android16-6.12-2025-06_r58"
          body_path: release_body.md
          files: release_zips/*.zip
