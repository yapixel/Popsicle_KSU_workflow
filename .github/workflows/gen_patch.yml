name: GitHub Patch Merger 6.12 (Expert v2.1)

on:
  workflow_dispatch:

jobs:
  merge-and-align:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare Kernel Source
        run: |
          mkdir -p kernel_workspace
          curl -L -o common.tar.gz https://github.com/yapixel/gki-build-assets/releases/download/android16-6.12-2025-06_r58/common-android16-6.12-2025-06_r58.tar.gz
          tar -xf common.tar.gz -C kernel_workspace

      - name: Precise Git Merge
        run: |
          # 1. 进入内核源码根目录
          cd kernel_workspace/common || cd kernel_workspace
          
          # 2. 局部初始化 Git
          git init
          git config user.email "yapixel@github.com"
          git config user.name "yapixel"

          # 3. 追踪目标文件
          git add fs/exec.c fs/open.c fs/stat.c kernel/reboot.c \
                  security/security.c security/selinux/hooks.c \
                  security/selinux/avc.c security/selinux/selinuxfs.c
          
          git commit -m "base"

          # 4. 按顺序应用补丁 (Scope-Min -> Selinux Hide)
          patch -p1 -l --fuzz=3 < "${{ github.workspace }}/.github/patches/xxksu/scope-min-manual-hooks-v2.0.patch"
          patch -p1 -l --fuzz=3 < "${{ github.workspace }}/.github/patches/xxksu/selinux_hide.patch"

          # 5. 构造带有 Issue 溯源信息的 v2.1 补丁头
          PATCH_FILE="${{ github.workspace }}/scope-min-manual-hooks-v2.1.patch"
          cat << EOF > "$PATCH_FILE"
          From: debiansid <yapixel@github.com>
          Date: $(date -u +"%a, %d %b %Y %H:%M:%S +0000")
          Subject: [PATCH] KernelSU Scope & SELinux Hide Integration v2.1

          Description:
          Integrated manual hooks for Non-Kprobes GKI kernels.
          Combined scope-min hooks with SELinux hide logic.

          Source:
          - Scope Hooks: https://github.com/backslashxx/KernelSU/issues/5
          - Integration: Integrated by yapixel for Android 16 (Kernel 6.12)

          Files modified: fs/exec.c, fs/open.c, fs/stat.c, kernel/reboot.c, 
                security/security.c, security/selinux/hooks.c, 
                security/selinux/avc.c, security/selinux/selinuxfs.c
---
EOF

          # 6. 追加统计和 diff 内容
          git diff --stat >> "$PATCH_FILE"
          echo "" >> "$PATCH_FILE"
          git diff >> "$PATCH_FILE"

      - name: Export Artifact
        uses: actions/upload-artifact@v4
        with:
          name: scope-min-v2.1-patch
          path: scope-min-manual-hooks-v2.1.patch
