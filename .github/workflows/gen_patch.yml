name: GitHub Patch Merger 6.12 (Git Format-Patch)

on:
  workflow_dispatch:

jobs:
  merge-and-align:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare Kernel Source
        run: |
          mkdir -p kernel_workspace
          curl -L -o common.tar.gz https://github.com/yapixel/gki-build-assets/releases/download/android16-6.12-2025-06_r58/common-android16-6.12-2025-06_r58.tar.gz
          tar -xf common.tar.gz -C kernel_workspace

      - name: Git Native Format Patch
        run: |
          # 1. 进入内核源码根目录
          cd kernel_workspace/common || cd kernel_workspace
          
          # 2. 初始化 Git 并配置
          git init
          git config user.email "yapixel@github.com"
          git config user.name "yapixel"

          # 3. 局部追踪并提交 Base
          git add fs/exec.c fs/open.c fs/stat.c kernel/reboot.c \
                  security/security.c security/selinux/hooks.c \
                  security/selinux/avc.c security/selinux/selinuxfs.c
          git commit -m "base: original kernel 6.12 source"

          # 4. 按顺序应用补丁
          patch -p1 -l --fuzz=3 < "${{ github.workspace }}/.github/patches/xxksu/scope-min-manual-hooks-v2.0.patch"
          patch -p1 -l --fuzz=3 < "${{ github.workspace }}/.github/patches/xxksu/selinux_hide.patch"

          # 5. 提交改动，在 Commit Message 中包含来源
          # 这里的消息会自动变成补丁的 Header
          git add -u
          git commit -m "scope-min-manual-hooks-v2.1" -m "Integration of Scope Hooks and SELinux Hide for Kernel 6.12.
          
          Source:
          - Scope Hooks: https://github.com/backslashxx/KernelSU/issues/5
          - Integrated by yapixel for Android 16 GKI"

          # 6. 使用 git format-patch 吐出标准的 v2.1 补丁
          # -1 表示针对最近的一次提交生成补丁，--stdout 将内容输出到指定文件
          git format-patch -1 HEAD --stdout > "${{ github.workspace }}/scope-min-manual-hooks-v2.1.patch"

      - name: Export Artifact
        uses: actions/upload-artifact@v4
        with:
          name: scope-min-v2.1-native
          path: scope-min-manual-hooks-v2.1.patch
