name: Module Build xxKSU

on:
  workflow_call:
    inputs:
      sub_level:
        required: true
        type: string

jobs:
  build:
    name: xxKSU 6.12.${{ inputs.sub_level }}
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      ANDROID_VERSION: 'android16'
      KERNEL_VERSION: '6.12'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          clean: false
          submodules: true

      - name: Free Disk Space & Install Dependencies
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            binutils python-is-python3 libssl-dev libelf-dev libdw-dev \
            curl bison flex make git perl gcc bc zip unzip aria2

      - name: Initialize Workspace & Toolchains
        run: |
          mkdir -p kernel_workspace && cd kernel_workspace 
          aria2c -s16 -x16 -k1M "https://github.com/MidoriKSU/dami-kernel-build/releases/download/0/android16-6.12-2025-06.tar.gz" -o common.tar.gz
          mkdir -p common
          tar -xzf common.tar.gz -C common 
          aria2c -s16 -x16 -k1M https://github.com/MidoriKSU/dami-kernel-build/releases/download/0/clang-r536225.tar.gz -o clang.tar.gz
          mkdir -p clang19 && tar -xzf clang.tar.gz -C clang19 && rm clang.tar.gz
          aria2c -s16 -x16 -k1M https://github.com/MidoriKSU/dami-kernel-build/releases/download/0/rust-1.82.0.tar.gz -o rust.tar.gz
          mkdir -p rust && tar -xzf rust.tar.gz -C rust && rm rust.tar.gz 
          aria2c -s16 -x16 -k1M https://github.com/MidoriKSU/dami-kernel-build/releases/download/0/bindgen -o rust/bin/bindgen && chmod +x rust/bin/bindgen
          aria2c -s16 -x16 -k1M https://github.com/MidoriKSU/dami-kernel-build/releases/download/0/build-tools.tar.gz -o build-tools.tar.gz
          mkdir -p build-tools && tar -xzf build-tools.tar.gz --strip-components=1 -C build-tools/ linux-x86/ && rm build-tools.tar.gz
          sed -i 's/ -dirty//g' common/scripts/setlocalversion

      - name: Setup xxKSU
        run: |
          cd kernel_workspace/common
          git clone --depth=1 --branch=master https://github.com/backslashxx/KernelSU.git KernelSU
          ln -sf ../KernelSU/kernel drivers/kernelsu
          grep -q "kernelsu" drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          grep -q "kernelsu" drivers/Kconfig || sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig

      - name: Create Patch Healer
        run: |
          cat > "${{ github.workspace }}/kernel_workspace/common/heal_patch.py" << 'PYEOF'
          import sys
          with open(sys.argv[1], 'r', encoding='utf-8') as f:
              lines = f.read().splitlines()
          with open(sys.argv[1], 'w', encoding='utf-8', newline='\n') as f:
              in_hunk = False
              for line in lines:
                  if line.startswith('@@ '): in_hunk = True; f.write(line + '\n'); continue
                  if line.startswith(('--- ', '+++ ')): in_hunk = False; f.write(line + '\n'); continue
                  if not in_hunk: f.write(line + '\n'); continue
                  if len(line) == 0: f.write(' \n')
                  elif line[0] not in ['+', '-', ' ', '\\']: f.write(' ' + line + '\n')
                  else: f.write(line + '\n')
          PYEOF

      - name: Apply Patches xxKSU (Security & Scope Hooks)
        run: |
          cd kernel_workspace/common
          python3 heal_patch.py "${{ github.workspace }}/.github/patches/xxksu/manual-security-hooks-v1.9.patch"
          patch -p1 -l --fuzz=3 < "${{ github.workspace }}/.github/patches/xxksu/manual-security-hooks-v1.9.patch"
          python3 heal_patch.py "${{ github.workspace }}/.github/patches/xxksu/scope-min-manual-hooks-v2.0.patch"
          patch -p1 -l --fuzz=3 < "${{ github.workspace }}/.github/patches/xxksu/scope-min-manual-hooks-v2.0.patch"

      - name: Inject Defconfig Flags
        uses: ./.github/actions/kernel-config
        with:
          defconfig_path: "kernel_workspace/common/arch/arm64/configs/gki_defconfig"
          build_config_path: "kernel_workspace/common/build.config.gki"
          variant: "xxksu"
          enable_susfs: "false"

      - name: Setup cc-wrapper for Clang version spoofing
        uses: ./.github/actions/setup-cc-wrapper
        with:
          workdir: kernel_workspace/common

      - name: Compile Kernel
        run: |
          WORKDIR="$(pwd)"
          export PATH="$WORKDIR/kernel_workspace/clang19/bin:$PATH"
          export PATH="$WORKDIR/kernel_workspace/build-tools/bin:$PATH"
          export PATH="$WORKDIR/kernel_workspace/rust/bin:$PATH"
          export CLANG_DIR="$WORKDIR/kernel_workspace/clang19/bin"
          CLANG_VERSION="$($CLANG_DIR/clang --version | head -n 1)"
          LLD_VERSION="$($CLANG_DIR/ld.lld --version | head -n 1)"
          RUSTC_VERSION="$(rustc -V 2>/dev/null | head -n1)"
          BINDGEN_VERSION="$(bindgen --version 2>/dev/null | head -n1)"
          echo "编译器信息:"
          echo "Clang版本: $CLANG_VERSION"
          echo "LLD版本: $LLD_VERSION"
          echo "Rustc版本: $RUSTC_VERSION"
          echo "Bindgen版本: $BINDGEN_VERSION"
          pahole_version=$(pahole --version 2>/dev/null | head -n1); [ -z "$pahole_version" ] && echo "pahole版本：未安装" || echo "pahole版本：$pahole_version"
          
          cd kernel_workspace/common
          
          # 复制环境初始化脚本
          cp ${{ github.workspace }}/_setup_env.sh ./ 2>/dev/null || true
          chmod 777 ./*.sh 2>/dev/null || true
          
          # 路径重映射 (解决 gendwarfksyms bug)
          COMMON_REAL_PATH=$(pwd -P)
          ROOT_REAL_PATH=$(dirname "$COMMON_REAL_PATH")
          KCFLAGS+=" -fdebug-prefix-map=$ROOT_REAL_PATH=."
          KCFLAGS+=" -fmacro-prefix-map=$ROOT_REAL_PATH=."
          KCFLAGS+=" -ffile-prefix-map=$ROOT_REAL_PATH=."
          
          # 声明 Rust 工具
          export RUSTC="rustc"
          export BINDGEN="bindgen"
          export CC="clang"
          export LIBCLANG_PATH="$WORKDIR/kernel_workspace/clang19/lib"
          
          # 配置 KCFLAGS
          KCFLAGS+=" -no-canonical-prefixes"
          KCFLAGS+=" -O2"
          KCFLAGS+=" -pipe"
          KCFLAGS+=" -Wno-error"
          KCFLAGS+=" -fno-stack-protector"
          KCFLAGS+=" -D__ANDROID_COMMON_KERNEL__"
          export KCFLAGS
          
          # 配置工具链
          export HOSTCC=clang
          export LD="ld.lld"
          export HOSTLD=ld.lld
          export LLVM=1 LLVM_IAS=1
          export ARCH=arm64 SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export AR=llvm-ar
          export NM=llvm-nm
          export AS=clang
          export READELF=llvm-readelf
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export OBJSIZE=llvm-size
          export STRIP=llvm-strip
          
          # 运行官方环境配置脚本
          source "./_setup_env.sh" 2>/dev/null || true
          
          # 强制覆盖被脚本重置的时间变量
          export SOURCE_DATE_EPOCH=1757653061
          export KBUILD_BUILD_TIMESTAMP="Fri Sep 12 04:57:41 UTC 2025"
          export KBUILD_BUILD_HOST="build-host"
          export KBUILD_BUILD_USER="kleaf"
          
          # 清理空间
          sudo rm -rf /usr/share/dotnet &
          sudo rm -rf /usr/local/lib/android &
          sudo rm -rf /opt/ghc &
          sudo rm -rf /opt/hostedtoolcache/CodeQL &
          
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="clang" LD="ld.lld" OBJCOPY="llvm-objcopy" O=out gki_defconfig
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="$(pwd)/cc-wrapper" LD="ld.lld" OBJCOPY="llvm-objcopy" O=out Image
          
          echo "内核编译完成！"
          echo "编译后空间:"
          df -h

      - name: Package & Boot-Ready Check
        run: |
          cd kernel_workspace
          IMAGE="./common/out/arch/arm64/boot/Image"
          [ -f "$IMAGE" ] || (echo " Image binary missing!" && exit 1)

          git clone https://github.com/yapixel/AnyKernel3 --depth=1
          cp "$IMAGE" ./AnyKernel3/ && cd AnyKernel3

          BUILD_DATE="$(date +'%y%m%d')"
          ZIP_NAME="xxksu_popsicle_6.12.${{ inputs.sub_level }}-${BUILD_DATE}.zip"
          zip -r9 "../$ZIP_NAME" *
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: kernel-xxksu
          path: kernel_workspace/${{ env.ZIP_NAME }}
