name: Build GKI xxksu/kowsu susfs test

on:
  workflow_dispatch:
    inputs:
      ksu_variant:
        description: 'KernelSU variant to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - kowsu
          - xxksu
      disable_susfs:
        description: 'Disable SuSFS features'
        required: false
        default: false
        type: boolean
      force_clean_build:
        description: 'Force clean build (ignore cache)'
        required: false
        default: false
        type: boolean
      create_release:
        description: 'Create GitHub Release with artifacts'
        required: false
        default: true
        type: boolean
      sub_level:
        description: 'Kernel sublevel (e.g. 23 for 6.12.23)'
        required: true
        default: '23'
        type: string

permissions:
  contents: write
  packages: write

env:
  KERNEL_ROOT: ${{ github.workspace }}/kernel-repo

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      enable_susfs: ${{ steps.config.outputs.enable_susfs }}
      force_clean: ${{ steps.config.outputs.force_clean }}
      create_release: ${{ steps.config.outputs.create_release }}
      sub_level: ${{ steps.config.outputs.sub_level }}
      release_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Set Build Matrix
        id: set-matrix
        run: |
          VARIANT="${{ github.event.inputs.ksu_variant }}"
          if [ "$VARIANT" = "all" ]; then
            echo 'matrix={"variant":["kowsu","xxksu"]}' >> $GITHUB_OUTPUT
          else
            echo "matrix={\"variant\":[\"$VARIANT\"]}" >> $GITHUB_OUTPUT
          fi

      - name: Set Build Config
        id: config
        run: |
          echo "enable_susfs=${{ github.event.inputs.disable_susfs == 'true' && 'false' || 'true' }}" >> $GITHUB_OUTPUT
          echo "force_clean=${{ github.event.inputs.force_clean_build }}" >> $GITHUB_OUTPUT
          echo "create_release=${{ github.event.inputs.create_release }}" >> $GITHUB_OUTPUT
          echo "sub_level=${{ github.event.inputs.sub_level }}" >> $GITHUB_OUTPUT

      - name: Resolve Release Tag
        id: tag
        run: |
          BASE_TAG="$(date +'%Y%m%d')"
          ALL_TAGS=$(gh api repos/${{ github.repository }}/tags --paginate \
            | jq -r '.[].name')
          if echo "$ALL_TAGS" | grep -qx "${BASE_TAG}"; then
            MAX_R=$(echo "$ALL_TAGS" | grep "^${BASE_TAG}-r" \
              | sed "s/^${BASE_TAG}-r//" | sort -n | tail -1)
            NEXT_R=$(( ${MAX_R:-1} + 1 ))
            RELEASE_TAG="${BASE_TAG}-r${NEXT_R}"
          else
            RELEASE_TAG="${BASE_TAG}"
          fi
          echo "tag=${RELEASE_TAG}" >> $GITHUB_OUTPUT
          echo "next_r=${RELEASE_TAG}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    env:
      ENABLE_SUSFS: ${{ needs.setup.outputs.enable_susfs }}
      FORCE_CLEAN: ${{ needs.setup.outputs.force_clean }}
      KSU_VARIANT: ${{ matrix.variant }}

    steps:
      - name: Free Disk Space & Install Build Dependencies
        run: |
          sudo apt-get purge -yq '^aspnetcore-.*' '^dotnet-.*' '^llvm-.*' 'php.*' '^mongodb-.*' '^mysql-.*' \
            azure-cli google-cloud-cli google-chrome-stable firefox powershell mono-devel libgl1-mesa-dri \
            'ghc-*' 'cabal-install' || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL \
            /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup /usr/lib/jvm \
            /usr/local/graalvm "$AGENT_TOOLSDIRECTORY" || true
          docker image prune -af 2>/dev/null || true
          sudo apt-get autoremove -yq
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison flex libssl-dev libelf-dev libdw-dev build-essential \
            python3 python3-pip rsync curl git zip unzip libncurses-dev \
            gawk dwarves zstd pahole kmod aria2

      - name: Checkout Workflow Repo
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Clone Scripts Repo
        run: |
          git clone --depth=1 https://github.com/yalixel/sh "${{ github.workspace }}/sh"
          chmod +x "${{ github.workspace }}/sh/get_ksuver.sh"

      - name: Download Clang 19 Toolchain
        run: |
          mkdir -p $HOME/clang19
          aria2c -s16 -x16 -k1M --download-result=hide --summary-interval=0 \
            "https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/clang-r536225.zip" \
            -o clang.zip
          unzip -q clang.zip -d $HOME/clang19
          rm -f clang.zip
          echo "CLANG_BIN=$HOME/clang19/bin" >> $GITHUB_ENV
          echo "$HOME/clang19/bin" >> $GITHUB_PATH

      - name: Download GNU Toolchains
        run: |
          mkdir -p $HOME/toolchains
          cd $HOME/toolchains
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/14.3.rel1/binrel/arm-gnu-toolchain-14.3.rel1-x86_64-aarch64-none-linux-gnu.tar.xz \
            -O tc.tar.xz
          tar -xJf tc.tar.xz && rm tc.tar.xz
          echo "ARM64_TOOLCHAIN=$HOME/toolchains/$(ls -d arm-gnu-toolchain-*aarch64*)/bin/aarch64-none-linux-gnu-" >> $GITHUB_ENV

          cd $HOME/toolchains
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/14.3.rel1/binrel/arm-gnu-toolchain-14.3.rel1-x86_64-arm-none-eabi.tar.xz \
            -O tc-arm.tar.xz
          tar -xJf tc-arm.tar.xz && rm tc-arm.tar.xz
          echo "ARM32_TOOLCHAIN=$HOME/toolchains/$(ls -d arm-gnu-toolchain-*arm-none-eabi*)/bin/arm-none-eabi-" >> $GITHUB_ENV

      - name: Sync Kernel Source (GKI 6.12)
        run: |
          mkdir -p "${{ env.KERNEL_ROOT }}" && cd "${{ env.KERNEL_ROOT }}"
          aria2c -s16 -x16 -k1M \
            https://github.com/cctv18/android_gki_kernel_common/archive/refs/heads/android16-6.12-2025-06.zip \
            -o common.zip
          unzip -q common.zip
          mv "android_gki_kernel_common-android16-6.12-2025-06" common
          rm -f common.zip
          echo "KERNEL_DIR=${{ env.KERNEL_ROOT }}/common" >> $GITHUB_ENV

      - name: Sync SuSFS Source
        run: |
          SUSFS_DIR="${{ github.workspace }}/susfs4ksu"
          git clone --depth=1 --branch=gki-android16-6.12-dev \
            https://gitlab.com/simonpunk/susfs4ksu "$SUSFS_DIR"
          echo "SUSFS_DIR=$SUSFS_DIR" >> $GITHUB_ENV

          SUSFS_VERSION=$(grep -m1 'define SUSFS_VERSION' \
            "$SUSFS_DIR/kernel_patches/include/linux/susfs.h" \
            | sed 's/.*"\(.*\)"/\1/')
          echo "SUSFS_VERSION=${SUSFS_VERSION:-unknown}" >> $GITHUB_ENV

      - name: Setup KernelSU Variant
        run: |
          cd "${{ env.KERNEL_DIR }}"
          case "${{ matrix.variant }}" in
            "kowsu")
              KSU_BRANCH="main"
              git clone --depth=1 --branch "$KSU_BRANCH" \
                https://github.com/KOWX712/KernelSU.git KernelSU
              ;;
            "xxksu")
              KSU_BRANCH="main"
              git clone --depth=1 --branch "$KSU_BRANCH" \
                https://github.com/backslashxx/KernelSU.git KernelSU
              ;;
          esac
          echo "KSU_BRANCH=${KSU_BRANCH}" >> $GITHUB_ENV

          ln -sf ../KernelSU/kernel drivers/kernelsu
          if ! grep -q "kernelsu/" drivers/Makefile; then
            echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          fi
          if ! grep -q "drivers/kernelsu/Kconfig" drivers/Kconfig; then
            sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          fi

      - name: Resolve KSU Version
        run: |
          case "${{ matrix.variant }}" in
            "kowsu")
              KSU_VER=$("${{ github.workspace }}/sh/get_ksuver.sh" "KOWX712" "KernelSU" "${{ env.KSU_BRANCH }}" \
                || echo "unknown")
              ;;
            "xxksu")
              KSU_VER=$("${{ github.workspace }}/sh/get_ksuver.sh" "backslashxx" "KernelSU" "${{ env.KSU_BRANCH }}" \
                || echo "unknown")
              ;;
          esac
          echo "KSU_VER=${KSU_VER}" >> $GITHUB_ENV

      - name: Create Patch Healer
        run: |
          cat > "${{ env.KERNEL_DIR }}/heal_patch.py" << 'PYEOF'
          import sys
          with open(sys.argv[1], 'r', encoding='utf-8') as f:
              lines = f.read().splitlines()
          with open(sys.argv[1], 'w', encoding='utf-8', newline='\n') as f:
              in_hunk = False
              for line in lines:
                  if line.startswith('@@ '):
                      in_hunk = True
                      f.write(line + '\n')
                      continue
                  if line.startswith(('--- ', '+++ ')):
                      in_hunk = False
                      f.write(line + '\n')
                      continue
                  if not in_hunk:
                      f.write(line + '\n')
                      continue
                  if len(line) == 0:
                      f.write(' \n')
                  elif line[0] not in ['+', '-', ' ', '\\']:
                      f.write(' ' + line + '\n')
                  else:
                      f.write(line + '\n')
          PYEOF

      - name: Apply SuSFS Patches
        if: env.ENABLE_SUSFS == 'true'
        run: |
          cd "${{ env.KERNEL_DIR }}"
          cp "${{ env.SUSFS_DIR }}/kernel_patches/fs/susfs.c" fs/
          cp "${{ env.SUSFS_DIR }}/kernel_patches/include/linux/susfs.h" include/linux/
          cp "${{ env.SUSFS_DIR }}/kernel_patches/include/linux/susfs_def.h" include/linux/
          patch -p1 < "${{ env.SUSFS_DIR }}/kernel_patches/50_add_susfs_in_gki-android16-6.12.patch"

      - name: Apply xxKSU Patches
        if: matrix.variant == 'xxksu'
        run: |
          cd "${{ env.KERNEL_DIR }}"
          python3 heal_patch.py "${{ github.workspace }}/.github/patches/xxksu/xxksu_susfs_compat.patch"
          patch -p1 -l --fuzz=3 < "${{ github.workspace }}/.github/patches/xxksu/xxksu_susfs_compat.patch"
          python3 heal_patch.py "${{ github.workspace }}/.github/patches/xxksu/manual-security-hooks-v1.8.patch"
          patch -p1 -l --fuzz=3 < "${{ github.workspace }}/.github/patches/xxksu/manual-security-hooks-v1.8.patch"
          python3 heal_patch.py "${{ github.workspace }}/.github/patches/xxksu/scope-min-hooks-v1.9.patch"
          patch -p1 -l --fuzz=3 < "${{ github.workspace }}/.github/patches/xxksu/scope-min-hooks-v1.9.patch"
          cd KernelSU
          python3 ../heal_patch.py "${{ github.workspace }}/.github/patches/xxksu/10_enable_susfs_for_ksu.patch"
          patch -p1 -l --fuzz=3 < "${{ github.workspace }}/.github/patches/xxksu/10_enable_susfs_for_ksu.patch"

      - name: Apply KowSU Patches
        if: matrix.variant == 'kowsu' && env.ENABLE_SUSFS == 'true'
        run: |
          cd "${{ env.KERNEL_DIR }}/KernelSU"
          patch -p1 -l --fuzz=3 < "${{ github.workspace }}/.github/patches/kowsu/10_enable_susfs_for_ksu.patch"

      - name: Apply Source Fixes
        run: |
          cd "${{ env.KERNEL_DIR }}"
          sed -i "s/^SUBLEVEL = .*/SUBLEVEL = ${{ github.event.inputs.sub_level }}/" Makefile

          sed -i 's/next_path = strchr(s, '"'"':'"'"');/next_path = (char *)strchr(s, '"'"':'"'"');/' \
            tools/lib/bpf/libbpf.c || true

          if [ -d "drivers/kernelsu" ]; then
            echo "subdir-ccflags-y += -fno-lto -fno-data-sections -fno-function-sections -fno-common" \
              >> drivers/kernelsu/Makefile
          fi

          sed -i 's/echo "\$res"$/echo ""/' scripts/setlocalversion

      - name: Apply Stock Config Spoof
        run: |
          STOCK_SRC="$GITHUB_WORKSPACE/config/stock_defconfig"
          STOCK_DST="${{ env.KERNEL_DIR }}/arch/arm64/configs/stock_defconfig"
          TARGET_MAKEFILE="${{ env.KERNEL_DIR }}/kernel/Makefile"

          if [ ! -f "$STOCK_SRC" ]; then
            echo "No stock_defconfig found, skipping spoof."
            exit 0
          fi

          if [ ! -f "$TARGET_MAKEFILE" ]; then
            echo "::error::kernel/Makefile not found: $TARGET_MAKEFILE"
            exit 1
          fi

          cp "$STOCK_SRC" "$STOCK_DST"
          echo "Copied stock_defconfig -> $STOCK_DST"

          NEW_RULE='$(obj)/config_data: arch/arm64/configs/stock_defconfig FORCE'
          OLD_RULE='$(obj)/config_data: $(KCONFIG_CONFIG) FORCE'

          if grep -qF "$NEW_RULE" "$TARGET_MAKEFILE"; then
            echo "config_data rule already points to stock_defconfig, skipping."
          elif grep -qF "$OLD_RULE" "$TARGET_MAKEFILE"; then
            sed -i 's|$(obj)/config_data: $(KCONFIG_CONFIG) FORCE|$(obj)/config_data: arch/arm64/configs/stock_defconfig FORCE|' "$TARGET_MAKEFILE"
            echo "Patched kernel/Makefile config_data rule."
          else
            echo "::error::Neither old nor new rule found in $TARGET_MAKEFILE"
            exit 1
          fi

      - name: Write Defconfig Fragment
        run: |
          FRAGMENT="${{ env.KERNEL_DIR }}/arch/arm64/configs/ksu_susfs.fragment"

          cat > "$FRAGMENT" <<-'EOF'
          CONFIG_KSU=y
          CONFIG_KSU_DEBUG=n
          CONFIG_DEBUG_INFO_BTF=n
          CONFIG_DEBUG_INFO_BTF_MODULES=n
          CONFIG_LTO_NONE=y
          CONFIG_LTO_CLANG=n
          CONFIG_LOCALVERSION_AUTO=n
          EOF

          if [ "${{ matrix.variant }}" = "xxksu" ]; then
            cat >> "$FRAGMENT" <<-'EOF'
          CONFIG_KSU_EXTRAS=y
          CONFIG_KSU_LSM_SECURITY_HOOKS=n
          CONFIG_KSU_TAMPER_SYSCALL_TABLE=n
          EOF
          fi

          cat >> "$FRAGMENT" <<-'EOF'

          # Networking
          CONFIG_IP_NF_TARGET_TTL=y
          CONFIG_IP6_NF_TARGET_HL=y
          CONFIG_IP6_NF_MATCH_HL=y

          # BBR TCP Congestion Control
          CONFIG_TCP_CONG_ADVANCED=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_NET_SCH_FQ=y
          # CONFIG_TCP_CONG_BIC is not set
          # CONFIG_TCP_CONG_WESTWOOD is not set
          # CONFIG_TCP_CONG_HTCP is not set

          # IPv6 NAT
          CONFIG_IP6_NF_NAT=y
          CONFIG_IP6_NF_TARGET_MASQUERADE=y

          # IPSet Support
          CONFIG_IP_SET=y
          CONFIG_IP_SET_MAX=65534
          CONFIG_IP_SET_BITMAP_IP=y
          CONFIG_IP_SET_BITMAP_IPMAC=y
          CONFIG_IP_SET_BITMAP_PORT=y
          CONFIG_IP_SET_HASH_IP=y
          CONFIG_IP_SET_HASH_IPMARK=y
          CONFIG_IP_SET_HASH_IPPORT=y
          CONFIG_IP_SET_HASH_IPPORTIP=y
          CONFIG_IP_SET_HASH_IPPORTNET=y
          CONFIG_IP_SET_HASH_IPMAC=y
          CONFIG_IP_SET_HASH_MAC=y
          CONFIG_IP_SET_HASH_NETPORTNET=y
          CONFIG_IP_SET_HASH_NET=y
          CONFIG_IP_SET_HASH_NETNET=y
          CONFIG_IP_SET_HASH_NETPORT=y
          CONFIG_IP_SET_HASH_NETIFACE=y
          CONFIG_IP_SET_LIST_SET=y

          # Mountify support
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          EOF

          if [ "${{ env.ENABLE_SUSFS }}" = "true" ]; then
            cat >> "$FRAGMENT" <<-'EOF'

          # SuSFS
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          EOF
          fi

          echo "FRAGMENT=$FRAGMENT" >> $GITHUB_ENV

      - name: Configure and Build Kernel
        run: |
          cd "${{ env.KERNEL_DIR }}"
          export ARCH=arm64
          export CROSS_COMPILE="${{ env.ARM64_TOOLCHAIN }}"
          export CROSS_COMPILE_COMPAT="${{ env.ARM32_TOOLCHAIN }}"
          export KBUILD_BUILD_USER=kleaf
          export KBUILD_BUILD_HOST=build-host
          export KBUILD_BUILD_TIMESTAMP="Fri Sep 12 04:57:41 UTC 2025"

          make ARCH=arm64 LLVM=1 O=out gki_defconfig
          cat "${{ env.FRAGMENT }}" >> out/.config
          make ARCH=arm64 LLVM=1 O=out olddefconfig

          make -j$(nproc) ARCH=arm64 LLVM=1 O=out \
            KBUILD_BUILD_USER=kleaf \
            KBUILD_BUILD_HOST=build-host \
            KBUILD_BUILD_TIMESTAMP="Fri Sep 12 04:57:41 UTC 2025" \
            KBUILD_LDFLAGS="--orphan-handling=warn"

          echo "DIST_DIR=${{ env.KERNEL_DIR }}/out/arch/arm64/boot" >> $GITHUB_ENV

      - name: Package Kernel (AnyKernel3)
        run: |
          git clone --depth=1 --branch=gki-2.0 https://github.com/WildKernels/AnyKernel3 AnyKernel3
          cp "${{ env.DIST_DIR }}/Image" AnyKernel3/

          BUILD_DATE="$(date +'%d%m%y')"
          ZIP_NAME="${{ matrix.variant }}_popsicle_6.12.${{ github.event.inputs.sub_level }}+${{ env.KSU_VER }}-${BUILD_DATE}-susfs-${{ env.SUSFS_VERSION }}.zip"
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

          cd AnyKernel3
          zip -r9 "../${ZIP_NAME}" .

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ matrix.variant }}
          path: "${{ env.ZIP_NAME }}"

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: needs.setup.outputs.create_release == 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download All Build Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: kernel-*
          path: release_zips
          merge-multiple: true

      - name: Collect Release Metadata
        id: meta
        run: |
          SUB="${{ needs.setup.outputs.sub_level }}"
          VARIANT_INPUT="${{ github.event.inputs.ksu_variant }}"
          SUSFS_ENABLED="${{ needs.setup.outputs.enable_susfs }}"
          FULL_VERSION="6.12.${SUB}"
          TIME_FMT="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          echo "full_version=${FULL_VERSION}" >> $GITHUB_OUTPUT
          echo "time_fmt=${TIME_FMT}" >> $GITHUB_OUTPUT
          echo "variant_input=${VARIANT_INPUT}" >> $GITHUB_OUTPUT
          echo "susfs_enabled=${SUSFS_ENABLED}" >> $GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ needs.setup.outputs.release_tag }}"
          name: "GKI ${{ steps.meta.outputs.full_version }} — ${{ needs.setup.outputs.release_tag }}"
          body: |
            ## Kernel Build Details
            | Field          | Value |
            | :------------- | :---- |
            | **Kernel**     | `${{ steps.meta.outputs.full_version }}` (android16-6.12, SM8850 · popsicle) |
            | **KSU Variant**| `${{ steps.meta.outputs.variant_input }}` |
            | **SuSFS**      | `${{ steps.meta.outputs.susfs_enabled == 'true' && 'Enabled' || 'Disabled' }}` |
            | **Compiler**   | Clang 19 (r536225) + arm-gnu-toolchain 14.3.rel1 |
            | **Build Time** | ${{ steps.meta.outputs.time_fmt }} (CST) |

            ## Networking
            | Feature | Detail |
            | :------ | :----- |
            | **Congestion Control** | BBR (default), CUBIC, Vegas, Westwood+, HTCP |
            | **IPset** | Enabled |

            ## Installation
            **Method A — Recovery (recommended)**
            1. Boot into TWRP / OrangeFox.
            2. Flash the AnyKernel3 zip below.
            3. Reboot.

            **Method B — In-Android**
            Use [HorizonKernelFlasher](https://github.com/libxzr/HorizonKernelFlasher) or [KernelFlasher](https://github.com/capntrips/KernelFlasher).

            ## KernelSU Manager
            | Variant | Manager |
            | :------ | :------ |
            | **xxKSU** | [backslashxx/KernelSU](https://github.com/backslashxx/KernelSU/releases) |
            | **KowSU** | [KOWX712/KernelSU](https://github.com/KOWX712/KernelSU/releases) |

            > ⚠️ A meta-module is required for mounting.
            > Recommended: [mountify](https://github.com/backslashxx/mountify) (xxKSU) · [meta-overlayfs](https://github.com/KernelSU-Modules-Repo/meta-overlayfs) · [hybrid-mount](https://github.com/YuzakiKokuban/meta-hybrid_mount)

            > Built automatically via GitHub Actions — [run #${{ github.run_number }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          draft: false
          prerelease: false
          files: release_zips/*.zip
