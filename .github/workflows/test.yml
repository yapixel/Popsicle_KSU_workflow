name: Build GKI with xxKSU

permissions:
  contents: write

on:
  workflow_call:
    inputs:
      sub_level:
        required: true
        type: string
        
  workflow_dispatch:
    inputs:
      sub_level:
        description: 'Kernel sub level (e.g. 23)'
        required: true
        type: string
        default: '23'

jobs:
  build:
    name: xxKSU 6.12.${{ inputs.sub_level || github.event.inputs.sub_level || '23' }}
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      ANDROID_VERSION: 'android16'
      KERNEL_VERSION: '6.12'
      RELEASE_TAG: '2025-06_r58'
    outputs:
      build_date: ${{ steps.meta.outputs.build_date }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          clean: false
          submodules: true

      - name: Free Disk Space & Install Dependencies
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            binutils python-is-python3 libssl-dev libelf-dev libdw-dev \
            curl bison flex make git perl gcc bc zip unzip aria2 \
            m4

      - name: Initialize Workspace & Toolchains
        run: |
          mkdir -p kernel_workspace && cd kernel_workspace 
          
          # Internal Sources
          aria2c -s16 -x16 -k1M "https://github.com/yapixel/gki-build-assets/releases/download/android16-6.12-2025-06_r58/common-android16-6.12-2025-06_r58.tar.gz" -o common.tar.gz
          mkdir -p common && tar -xzf common.tar.gz -C common && rm common.tar.gz
          
          # Clang r536225/r547379
          #aria2c -s16 -x16 -k1M "https://github.com/yapixel/gki-build-assets/releases/download/r536225/clang-r536225.tar.gz" -o clang.tar.gz
          aria2c -s16 -x16 -k1M "https://github.com/yapixel/gki-build-assets/releases/download/android16-6.12-2025-06_r58/clang-r547379.tar.gz" -o clang.tar.gz
          mkdir -p clang && tar -xzf clang.tar.gz -C clang && rm clang.tar.gz
          
          # Rust 1.82.0
          aria2c -s16 -x16 -k1M "https://github.com/yapixel/gki-build-assets/releases/download/r536225/rust-1.82.0.tar.gz" -o rust.tar.gz
          mkdir -p rust && tar -xzf rust.tar.gz -C rust && rm rust.tar.gz
          
          # Clang-tools
          aria2c -s16 -x16 -k1M "https://github.com/yapixel/gki-build-assets/releases/download/r536225/clang-tools-r536225.tar.gz" -o clang-tools.tar.gz
          mkdir -p clang-tools && tar -xzf clang-tools.tar.gz -C clang-tools && rm clang-tools.tar.gz
          
          # Build-tools
          aria2c -s16 -x16 -k1M "https://github.com/yapixel/gki-build-assets/releases/download/r536225/build-tools.tar.gz" -o build-tools.tar.gz
          mkdir -p build-tools && tar -xzf build-tools.tar.gz -C build-tools && rm build-tools.tar.gz
          
          sed -i 's/ -dirty//g' common/scripts/setlocalversion
          
      - name: Setup xxKSU
        run: |
          cd kernel_workspace/common
          git clone --depth=1 --branch=master https://github.com/backslashxx/KernelSU.git KernelSU
          ln -sf ../KernelSU/kernel drivers/kernelsu
          grep -q "kernelsu" drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          grep -q "kernelsu" drivers/Kconfig || sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig

      - name: Integrate xxKSU
        run: |
          cd kernel_workspace/common
          patch -p1 -l --fuzz=3 < "${{ github.workspace }}/.github/patches/xxksu/manual-security-hooks-v1.9.patch"
          patch -p1 -l --fuzz=3 < "${{ github.workspace }}/.github/patches/xxksu/scope-min-manual-hooks-v2.0.patch"

      - name: Prepare Build Metadata
        id: meta
        run: |
          git clone --depth=1 https://github.com/TheSillyOk/sh.git scripts
          KSU_VERSION=$(./scripts/get_ksuver.sh "backslashxx" "KernelSU" "master" || echo "0.0.0")
          BUILD_DATE=$(date +'%y%m%d')
          echo "ksu_version=$KSU_VERSION" >> $GITHUB_OUTPUT
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT

      - name: Inject Defconfig Flags
        uses: ./.github/actions/kernel-config
        with:
          defconfig_path: "kernel_workspace/common/arch/arm64/configs/gki_defconfig"
          build_config_path: "kernel_workspace/common/build.config.gki"
          variant: "xxksu"
          enable_susfs: "false"

      - name: Compile Kernel
        run: |
          WORKDIR="$(pwd)"
          export PATH="$WORKDIR/kernel_workspace/clang/bin:$PATH"
          export PATH="$WORKDIR/kernel_workspace/build-tools/bin:$PATH"
          export PATH="$WORKDIR/kernel_workspace/clang-tools:$PATH"
          export PATH="$WORKDIR/kernel_workspace/rust/bin:$PATH"
          
          cd kernel_workspace/common
          
          export LLVM=1
          export LLVM_IAS=1
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export HOSTCC=clang
          export HOSTLD=ld.lld
          export CC=clang
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export READELF=llvm-readelf
          export STRIP=llvm-strip
          
          export SOURCE_DATE_EPOCH=1757653061
          export KBUILD_BUILD_TIMESTAMP="Fri Sep 12 04:57:41 UTC 2025"
          export KBUILD_BUILD_HOST="build-host"
          export KBUILD_BUILD_USER="kleaf"
          
          sudo rm -rf /usr/share/dotnet &
          sudo rm -rf /usr/local/lib/android &
          sudo rm -rf /opt/ghc &
          sudo rm -rf /opt/hostedtoolcache/CodeQL &
          
          make -j$(nproc --all) O=out gki_defconfig
          make -j$(nproc --all) O=out Image

      - name: Package & Boot-Ready Check
        run: |
          cd kernel_workspace
          IMAGE="./common/out/arch/arm64/boot/Image"
          [ -f "$IMAGE" ] || exit 1

          git clone https://github.com/yapixel/AnyKernel3 --depth=1
          cp "$IMAGE" ./AnyKernel3/ && cd AnyKernel3

          SUB="${{ inputs.sub_level || github.event.inputs.sub_level || '23' }}"
          KSU_VER="${{ steps.meta.outputs.ksu_version }}"
          DATE_ID="${{ steps.meta.outputs.build_date }}"
          
          ZIP_NAME="KSU_popsicle_6.12.${SUB}+${KSU_VER}-${DATE_ID}.zip"
          zip -r9 "../$ZIP_NAME" *
          cd ..
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-xxksu
          path: kernel_workspace/${{ env.ZIP_NAME }}

  publish-release:
    needs: build
    uses: ./.github/workflows/release.yml
    with:
      ksu_variant: 'xxksu'
      sub_level: ${{ inputs.sub_level || github.event.inputs.sub_level || '23' }}
      kernel_ver: '6.12'
      build_date: ${{ needs.build.outputs.build_date }}
    secrets: inherit