name: Fast Build 6.12.23 OPlus OKI Kernel

env:
  TZ: Asia/Shanghai
  ANDROID_VERSION: 'android16'
  KERNEL_VERSION: '6.12'
  SUB_VERSION: '23'
  KERNEL_NAME: 'android16-5-ga8f88ad96df3-ab13929693-4k'
  CCACHE_KEY: ccache-neov5-6.12.23

on:
  workflow_dispatch:
    inputs:
      ksu_type:
        description: 'KernelSU Variant (KowSU/None)'
        required: true
        type: choice
        default: 'kowsu'
        options:
          - 'kowsu'
          - 'none'
      susfs_enable:
        description: 'Enable SuSFS'
        required: true
        type: boolean
        default: 'true'
      better_net:
        description: 'Enable Enhanced Network Configuration'
        required: true
        type: boolean
        default: 'false'
      bbr_enable:
        description: "Enable BBR Congestion Control"
        required: true
        type: choice
        default: 'false'
        options: [ 'false', 'true', 'default' ]
      adios_enable:
        description: 'Enable ADIOS IO Scheduler Support'
        required: true
        type: boolean
        default: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      ksuver: ${{ steps.ksu_version.outputs.ksuver }}
      ak3name: ${{ steps.create_zip.outputs.ak3name }}
    permissions:
      actions: write
      contents: read
    steps:
      - name: Initialize Environment (Oppo Fast Build)
        run: |
          rm -rf kernel_workspace && mkdir kernel_workspace && cd kernel_workspace
          sudo apt update && sudo apt-get install -y --no-install-recommends binutils python-is-python3 libssl-dev libelf-dev libdw-dev aria2
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/lib/ccache-x86-64 -O ccache
          sudo cp -f ./ccache /usr/bin/ccache && sudo chmod +x /usr/bin/ccache && rm -f ./ccache
          
          # Download Kernel Source
          aria2c -s16 -x16 -k1M https://github.com/cctv18/android_kernel_common_oneplus_sm8850/archive/refs/heads/oneplus/sm8850_v_16.0.0_oneplus_15.zip -o common.zip
          unzip -q common.zip && mv "android_kernel_common_oneplus_sm8850-oneplus-sm8850_v_16.0.0_oneplus_15" common && rm -rf common.zip
          
          # Download Toolchains
          mkdir -p clang19 rust
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/clang-r536225.zip -o clang.zip
          unzip -q clang.zip -d clang19 && aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/rust.zip -o rust.zip
          unzip -q rust.zip -d rust && aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/build-tools.zip -o build-tools.zip
          unzip -q build-tools.zip && rm -rf *.zip

      - name: Setup KowSU (From build-kowsu.yml)
        id: ksu_version
        if: github.event.inputs.ksu_type == 'kowsu'
        run: |
          cd kernel_workspace/common
          echo "📥 Integrating KowSU via KOWX712/KernelSU..."
          KERNEL_DIR="$(pwd)" bash <(curl -LSs "https://raw.githubusercontent.com/KOWX712/KernelSU/master/kernel/setup.sh") master
          
          cd KernelSU
          git fetch --unshallow || true
          KSU_COUNT=$(git rev-list --count HEAD 2>/dev/null || echo "0")
          KSU_VERSION=$((KSU_COUNT + 30000))
          echo "KSUVER=r$KSU_VERSION" >> $GITHUB_ENV
          echo "ksuver=r$KSU_VERSION" >> $GITHUB_OUTPUT

      - name: Apply SuSFS patches (KowSU variant)
        if: inputs.susfs_enable && github.event.inputs.ksu_type == 'kowsu'
        run: |
          cd kernel_workspace
          git clone --depth=1 https://github.com/cctv18/susfs4oki.git susfs4ksu -b oki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}
          git clone --depth=1 https://github.com/yapixel/kernel_patches.git patches

          COMMON_DIR="$(pwd)/common"
          SUSFS_DIR="$(pwd)/susfs4ksu"
          PATCHES_DIR="$(pwd)/patches"
          PATCH_NAME="50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch"

          cp "$SUSFS_DIR/kernel_patches/fs/"* "$COMMON_DIR/fs/"
          cp "$SUSFS_DIR/kernel_patches/include/linux/"* "$COMMON_DIR/include/linux/"
          cp "$SUSFS_DIR/kernel_patches/$PATCH_NAME" "$COMMON_DIR/"
          
          cd "$COMMON_DIR"
          echo "📋 Applying $PATCH_NAME..."
          patch -p1 -F 3 < "$PATCH_NAME" || echo "⚠️ Core SuSFS patch warning"

          cd "$COMMON_DIR/KernelSU"
          echo "📋 Applying 10_enable_susfs_for_ksu.patch (kowsu specific)..."
          cp "$PATCHES_DIR/kowsu/10_enable_susfs_for_ksu.patch" ./
          patch -p1 < 10_enable_susfs_for_ksu.patch || { echo "❌ KowSU SuSFS patch failed!"; exit 1; }

      - name: Add SuSFS Configuration Items
        if: inputs.susfs_enable
        run: |
          cd kernel_workspace
          {
            echo "CONFIG_KSU_SUSFS=y"
            echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y"
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y"
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y"
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y"
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y"
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y"
            echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y"
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y"
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y"
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y"
            echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y"
            echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y"
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y"
            echo "CONFIG_KSU_SUSFS_SUS_MAP=y"
          } >> ./common/arch/arm64/configs/gki_defconfig

      - name: Enable Network Enhancement Optimization
        if: inputs.better_net
        run: |
          cd kernel_workspace
          {
            echo "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y"
            echo "CONFIG_NETFILTER_XT_SET=y"
            echo "CONFIG_IP_SET=y"
            echo "CONFIG_IP_SET_MAX=65534"
            echo "CONFIG_IP_SET_BITMAP_IP=y"
            echo "CONFIG_IP_SET_BITMAP_IPMAC=y"
            echo "CONFIG_IP_SET_BITMAP_PORT=y"
            echo "CONFIG_IP_SET_HASH_IP=y"
            echo "CONFIG_IP_SET_HASH_IPMARK=y"
            echo "CONFIG_IP_SET_HASH_IPPORT=y"
            echo "CONFIG_IP_SET_HASH_IPPORTIP=y"
            echo "CONFIG_IP_SET_HASH_IPPORTNET=y"
            echo "CONFIG_IP_SET_HASH_IPMAC=y"
            echo "CONFIG_IP_SET_HASH_MAC=y"
            echo "CONFIG_IP_SET_HASH_NETPORTNET=y"
            echo "CONFIG_IP_SET_HASH_NET=y"
            echo "CONFIG_IP_SET_HASH_NETNET=y"
            echo "CONFIG_IP_SET_HASH_NETPORT=y"
            echo "CONFIG_IP_SET_HASH_NETIFACE=y"
            echo "CONFIG_IP_SET_LIST_SET=y"
            echo "CONFIG_IP6_NF_NAT=y"
            echo "CONFIG_IP6_NF_TARGET_MASQUERADE=y"
          } >> ./common/arch/arm64/configs/gki_defconfig
          cd common
          wget https://github.com/$GITHUB_REPOSITORY/raw/refs/heads/$GITHUB_REF_NAME/other_patch/config.patch
          patch -p1 -F 3 < config.patch || true

      - name: Add BBR and Congestion Control Algorithms
        run: |
          if [[ "${{ github.event.inputs.bbr_enable }}" != "false" ]]; then
            cd kernel_workspace
            {
              echo "CONFIG_TCP_CONG_ADVANCED=y"
              echo "CONFIG_TCP_CONG_BBR=y"
              echo "CONFIG_TCP_CONG_CUBIC=y"
              echo "CONFIG_TCP_CONG_VEGAS=y"
              echo "CONFIG_TCP_CONG_NV=y"
              echo "CONFIG_TCP_CONG_WESTWOOD=y"
              echo "CONFIG_TCP_CONG_HTCP=y"
              echo "CONFIG_TCP_CONG_BRUTAL=y"
            } >> ./common/arch/arm64/configs/gki_defconfig
            if [[ "${{ github.event.inputs.bbr_enable }}" == "default" ]]; then
              echo "CONFIG_DEFAULT_TCP_CONG=bbr" >> ./common/arch/arm64/configs/gki_defconfig
            else
              echo "CONFIG_DEFAULT_TCP_CONG=cubic" >> ./common/arch/arm64/configs/gki_defconfig
            fi
          fi

      - name: Optimized Defconfig for Bootability
        run: |
          cd kernel_workspace/common
          # Ensure KSU is enabled
          if [[ "${{ github.event.inputs.ksu_type }}" == "kowsu" ]]; then
            echo "CONFIG_KSU=y" >> arch/arm64/configs/gki_defconfig
            # Explicitly disable KPROBES if you are experiencing bootloops
            echo "CONFIG_KSU_KPROBES_HOOK=n" >> arch/arm64/configs/gki_defconfig
          fi
          
          # SuSFS Core Configs
          if [[ "${{ github.event.inputs.susfs_enable }}" == "true" ]]; then
            echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> arch/arm64/configs/gki_defconfig
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> arch/arm64/configs/gki_defconfig
          fi

          # Disable strict OPlus checks that might trigger on modified kernels
          sed -i 's/CONFIG_SECTION_MISMATCH_WARN_ONLY=n/CONFIG_SECTION_MISMATCH_WARN_ONLY=y/' arch/arm64/configs/gki_defconfig

      - name: Build Kernel (Oppo Fast Build Process)
        run: |
          WORKDIR="$(pwd)"
          export PATH="/usr/lib/ccache:$WORKDIR/kernel_workspace/clang19/bin:$WORKDIR/kernel_workspace/build-tools/bin:$WORKDIR/kernel_workspace/rust/bin:$PATH"
          export LIBCLANG_PATH="$WORKDIR/kernel_workspace/clang19/lib"
          cd kernel_workspace/common
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- O=out gki_defconfig
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- O=out Image

      - name: Package AnyKernel3
        id: create_zip
        run: |
          cd kernel_workspace
          git clone https://github.com/cctv18/AnyKernel3 --depth=1
          cp common/out/arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          AK3_NAME="AnyKernel3-KowSU-${{ env.KSUVER }}-${{ env.KERNEL_VERSION }}.zip"
          zip -r ../$AK3_NAME ./*
          echo "ak3name=$AK3_NAME" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          path: kernel_workspace/AnyKernel*.zip
          name: kernel-artifact

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v8
        with:
          name: kernel-artifact
          path: ./release_zips
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: KowSU-r${{ needs.build.outputs.ksuver }}-${{ github.run_id }}
          name: "GKI ${{ env.KERNEL_VERSION }} | KowSU ${{ needs.build.outputs.ksuver }}"
          body: |
            ### Build Information
            - **Variant**: KowSU (KOWX712)
            - **KSU Version**: ${{ needs.build.outputs.ksuver }}
            - **SuSFS**: ${{ github.event.inputs.susfs_enable }}
            - **Enhanced Network**: ${{ github.event.inputs.better_net }}
            - **BBR**: ${{ github.event.inputs.bbr_enable }}
          files: release_zips/*.zip
