name: Build GKI Kernel android16-6.12 - Xiaomi 17 Pro Max (popsicle)

on:
  workflow_dispatch:
    inputs:
      ksu_variant:
        description: 'KernelSU variant to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - kowsu
          - resukisu
      disable_susfs:
        description: 'Disable SuSFS features'
        required: false
        default: false
        type: boolean
      force_clean_build:
        description: 'Force clean build (ignore cache)'
        required: false
        default: false
        type: boolean
      enable_telegram:
        description: 'Enable Telegram notifications'
        required: false
        default: true
        type: boolean
      create_release:
        description: 'Create GitHub Release with artifacts'
        required: false
        default: true
        type: boolean
      debug:
        description: 'Enable debug output'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

# All toolchain paths are resolved at runtime after download.
# CCACHE_DIR points inside the workspace so GitHub cache can persist it.
env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  TOOLCHAIN_DIR: ${{ github.workspace }}/toolchains

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      enable_susfs: ${{ steps.config.outputs.enable_susfs }}
      force_clean: ${{ steps.config.outputs.force_clean }}
      build_start_time: ${{ steps.timestamp.outputs.start_time }}
      create_release: ${{ steps.config.outputs.create_release }}
    steps:
      - name: Record Build Start Time
        id: timestamp
        run: |
          echo "WORKFLOW_START_TIME=$(date +%s)" >> $GITHUB_ENV
          START_TIME=$(date +%s)
          echo "start_time=$START_TIME" >> $GITHUB_OUTPUT
          echo "::notice::Workflow started at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Set Build Matrix
        id: set-matrix
        run: |
          VARIANT="${{ github.event.inputs.ksu_variant }}"

          if [ "$VARIANT" = "all" ]; then
            echo 'matrix={"variant":["kowsu","resukisu"]}' >> $GITHUB_OUTPUT
            echo "🎯 Building all variants: kowsu, resukisu"
          else
            echo "matrix={\"variant\":[\"$VARIANT\"]}" >> $GITHUB_OUTPUT
            echo "🎯 Building single variant: $VARIANT"
          fi

      - name: Set Build Config
        id: config
        run: |
          echo "enable_susfs=${{ github.event.inputs.disable_susfs == 'true' && 'false' || 'true' }}" >> $GITHUB_OUTPUT
          echo "force_clean=${{ github.event.inputs.force_clean_build }}" >> $GITHUB_OUTPUT
          echo "create_release=${{ github.event.inputs.create_release }}" >> $GITHUB_OUTPUT

  build:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    env:
      ENABLE_SUSFS: ${{ needs.setup.outputs.enable_susfs }}
      FORCE_CLEAN: ${{ needs.setup.outputs.force_clean }}
      KSU_VARIANT: ${{ matrix.variant }}

    steps:
      - name: Free Disk Space & Install Build Dependencies
        # Purge large pre-installed packages BEFORE apt-get update to avoid ENOSPC.
        run: |
          echo "=== Disk before cleanup ==="
          df -h /

          sudo apt-get purge -yq \
            '^aspnetcore-.*' '^dotnet-.*' '^llvm-.*' \
            'php.*' '^mongodb-.*' '^mysql-.*' \
            azure-cli google-cloud-cli google-chrome-stable \
            firefox powershell mono-devel libgl1-mesa-dri \
            'ghc-*' 'cabal-install' \
            || true

          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/powershell \
            /usr/share/swift \
            /usr/local/.ghcup \
            /usr/lib/jvm \
            /usr/local/graalvm \
            "$AGENT_TOOLSDIRECTORY"

          docker image prune -af 2>/dev/null || true

          sudo apt-get autoremove -yq
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

          echo "=== Disk after cleanup ==="
          df -h /

          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison flex libssl-dev libelf-dev \
            build-essential binutils-aarch64-linux-gnu \
            python3 python3-pip rsync \
            ccache curl zip unzip git \
            libncurses-dev gawk openssl \
            dwarves zstd pahole
          echo "✅ Dependencies installed"

          echo "=== Disk after apt install ==="
          df -h /

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ matrix.variant }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ matrix.variant }}-${{ github.ref_name }}-
            ccache-${{ matrix.variant }}-

      - name: Configure ccache
        run: |
          ccache --max-size=5G
          ccache --set-config=compression=true
          ccache --set-config=compression_level=1
          echo "ccache version: $(ccache --version | head -1)"

      - name: Download & Verify Clang Toolchain
        run: |
          mkdir -p $HOME/clang
          cd $HOME/clang
          # Using AOSP prebuilt clang-r536225 (clang 19.0.1) — the exact toolchain
          # used to build the stock android16-6.12 kernel per /proc/version:
          # "Android (14043575, based on r536225) clang version 19.0.1"
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r536225.tar.gz -O clang.tar.gz
          tar -xzf clang.tar.gz
          rm clang.tar.gz
          echo "✅ $(bin/clang --version | head -1)"
          echo "CLANG_BIN=$HOME/clang/bin" >> $GITHUB_ENV
          echo "$HOME/clang/bin" >> $GITHUB_PATH

      - name: Download & Verify AArch64 GNU Toolchain
        run: |
          mkdir -p $HOME/toolchains
          cd $HOME/toolchains
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/14.3.rel1/binrel/arm-gnu-toolchain-14.3.rel1-x86_64-aarch64-none-linux-gnu.tar.xz -O tc.tar.xz
          tar -xJf tc.tar.xz
          rm tc.tar.xz
          TC_DIR=$(ls -d arm-gnu-toolchain-*aarch64*)
          echo "ARM64_TOOLCHAIN=$HOME/toolchains/$TC_DIR/bin/aarch64-none-linux-gnu-" >> $GITHUB_ENV
          echo "✅ AArch64 toolchain ready: $HOME/toolchains/$TC_DIR"

      - name: Download & Verify ARM32 GNU Toolchain
        run: |
          mkdir -p $HOME/toolchains
          cd $HOME/toolchains
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/14.3.rel1/binrel/arm-gnu-toolchain-14.3.rel1-x86_64-arm-none-eabi.tar.xz -O tc-arm.tar.xz
          tar -xJf tc-arm.tar.xz
          rm tc-arm.tar.xz
          TC_DIR=$(ls -d arm-gnu-toolchain-*arm-none-eabi*)
          echo "ARM32_TOOLCHAIN=$HOME/toolchains/$TC_DIR/bin/arm-none-eabi-" >> $GITHUB_ENV
          echo "✅ ARM32 toolchain ready: $HOME/toolchains/$TC_DIR"

      - name: Pre-Clean Build Artifacts
        run: |
          echo "🧹 Cleaning previous build artifacts..."
          rm -rf AnyKernel3 release-assets changelogs || true

      - name: Checkout Workflow Repo
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Smart Sync Kernel & SuSFS Sources
        run: |
          echo "📦 Smart syncing kernel and SuSFS sources..."

          # 1. Smart Sync Kernel (GKI android16-6.12, pinned to 2025-05-exp tag)
          # android16-6.12 is the correct AOSP branch for kernel 6.12 / Android 16 (Baklava).
          # 2025-05-exp is an experimental tag on that branch — we fetch the branch and then
          # checkout the tag so depth=1 clones still work if the tag is reachable.
          if [ -d "kernel/.git" ]; then
            echo "♻️ Existing kernel tree found. Factory resetting and updating..."
            cd kernel
            git fetch --depth=1 origin android16-6.12
            git reset --hard origin/android16-6.12
            # Attempt to pin to the exact experimental tag if it exists
            git fetch --depth=1 origin tag android16-6.12-2025-05-exp 2>/dev/null && \
              git checkout android16-6.12-2025-05-exp || \
              echo "⚠️ Tag android16-6.12-2025-05-exp not found, staying on branch HEAD"
            git clean -fdx
            cd ..
          else
            echo "📥 Downloading kernel source (android16-6.12)..."
            git clone --depth=1 --branch=android16-6.12 \
              https://android.googlesource.com/kernel/common kernel
            # Pin to the experimental tag if available
            cd kernel
            git fetch --depth=1 origin tag android16-6.12-2025-05-exp 2>/dev/null && \
              git checkout android16-6.12-2025-05-exp || \
              echo "⚠️ Tag android16-6.12-2025-05-exp not found, using branch HEAD"
            cd ..
          fi

          # 2. Smart Sync SuSFS (gki-android16-6.12-dev, pinned to known-good commit)
          if [ -d "susfs4ksu/.git" ]; then
            echo "♻️ Existing SuSFS tree found. Factory resetting and updating..."
            cd susfs4ksu
            git fetch --unshallow 2>/dev/null || true
            git fetch origin
            git reset --hard 315af1ddffcfc946cdcc548fd1a51a737e4e9001
            git clean -fdx
            cd ..
          else
            echo "📥 Downloading SuSFS source (gki-android16-6.12-dev)..."
            git clone --depth=1 --branch=gki-android16-6.12-dev \
              https://gitlab.com/simonpunk/susfs4ksu susfs4ksu
            git -C susfs4ksu fetch --unshallow 2>/dev/null || true
            git -C susfs4ksu fetch origin
            git -C susfs4ksu reset --hard 315af1ddffcfc946cdcc548fd1a51a737e4e9001
            git -C susfs4ksu clean -fdx
          fi

      - name: Store Commit Info (Workflow, Kernel, SuSFS)
        run: |
          # Workflow
          read -r W_HASH W_SHORT W_DATE W_MSG << EOF
          $(git log -1 --format="%H %h %cd %s" --date=format:'%Y-%m-%d %H:%M:%S')
          EOF
          echo "WORKFLOW_COMMIT_SHORT=$W_SHORT" >> $GITHUB_ENV
          echo "WORKFLOW_COMMIT_MSG=$W_MSG" >> $GITHUB_ENV

          # Kernel
          cd kernel
          read -r K_HASH K_SHORT K_DATE K_MSG << EOF
          $(git log -1 --format="%H %h %cd %s" --date=format:'%Y-%m-%d %H:%M:%S')
          EOF
          echo "KERNEL_COMMIT_SHORT=$K_SHORT" >> $GITHUB_ENV
          echo "KERNEL_COMMIT_MSG=$K_MSG" >> $GITHUB_ENV

          # SuSFS
          cd ../susfs4ksu
          read -r S_HASH S_SHORT S_DATE S_MSG << EOF
          $(git log -1 --format="%H %h %cd %s" --date=format:'%Y-%m-%d %H:%M:%S')
          EOF
          echo "SUSFS_COMMIT_SHORT=$S_SHORT" >> $GITHUB_ENV
          echo "SUSFS_COMMIT_MSG=$S_MSG" >> $GITHUB_ENV

      - name: Show CCACHE Status
        run: |
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          ccache -s | grep -E "(Cacheable calls|Hits|Misses|Hit rate|cache size)" || true

      - name: Setup KernelSU Variant
        run: |
          KSU_SETUP_START=$SECONDS
          cd kernel && rm -rf KernelSU drivers/kernelsu KernelSU-Next

          case "${{ matrix.variant }}" in
            "kowsu")    KSU_REPO="KOWX712/KernelSU";   KSU_BRANCH="master" ;;
            "resukisu") KSU_REPO="ReSukiSU/ReSukiSU";  KSU_BRANCH="main"   ;;
          esac

          git clone --depth=1 --branch=$KSU_BRANCH https://github.com/$KSU_REPO.git KernelSU

          # Manually symlink to prevent fork setup scripts from rogue-cloning
          echo "🔗 Manually symlinking KernelSU into drivers/kernelsu..."
          ln -sf ../KernelSU/kernel drivers/kernelsu

          # Register with kernel build system
          grep -q "kernelsu" drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          grep -q "kernelsu" drivers/Kconfig  || sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig

          echo "KSU_REPO=$KSU_REPO" >> $GITHUB_ENV
          echo "KSU_BRANCH=$KSU_BRANCH" >> $GITHUB_ENV
          echo "KSU_SETUP_TIME=$((SECONDS - KSU_SETUP_START))s" >> $GITHUB_ENV

      - name: Get KSU Version Info & Commit
        run: |
          cd kernel/KernelSU
          git fetch --unshallow --quiet || git fetch --depth=10000 --quiet || true

          if [ "${{ matrix.variant }}" = "resukisu" ]; then
            git fetch origin main:main --quiet || true
            KSU_COUNT=$(git rev-list --count main)
            KSU_VERSION=$((40000 + KSU_COUNT - 2815))
          else
            # kowsu
            KSU_COUNT=$(git rev-list --count HEAD)
            KSU_VERSION=$((KSU_COUNT + 30000))
          fi

          read -r KSU_C_HASH KSU_C_SHORT KSU_C_DATE KSU_C_MSG KSU_C_AUTH << EOF
          $(git log -1 --format="%H %h %cd %s %an" --date=format:'%Y-%m-%d %H:%M:%S')
          EOF

          echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
          echo "KSU_COMMIT_SHORT=$KSU_C_SHORT" >> $GITHUB_ENV
          echo "KSU_COMMIT_MSG=$KSU_C_MSG" >> $GITHUB_ENV

      - name: Generate Comprehensive Changelog
        if: needs.setup.outputs.create_release == 'true'
        run: |
          mkdir -p changelogs
          CHANGELOG_FILE="changelogs/CHANGELOG-${{ matrix.variant }}.md"

          cat << EOF > "$CHANGELOG_FILE"
          # 📋 Comprehensive Build Changelog

          **Device:** Xiaomi 17 Pro Max (popsicle)
          **SoC:** Snapdragon 8 Elite Gen 5 (SM8850-AC)
          **Variant:** ${{ matrix.variant }}
          **Build Number:** #${{ github.run_number }}
          **KernelSU Version:** r${{ env.KSU_VERSION }}
          **SuSFS:** ${{ env.ENABLE_SUSFS == 'true' && 'Enabled' || 'Disabled' }}

          ---
          ## 📖 Component Versions
          | Component | Current Commit | Date | Summary |
          |-----------|---------------|------|---------|
          | **KernelSU** | \`${{ env.KSU_COMMIT_SHORT }}\` | $(date) | ${{ env.KSU_COMMIT_MSG }} |
          | **Kernel** | \`${{ env.KERNEL_COMMIT_SHORT }}\` | $(date) | ${{ env.KERNEL_COMMIT_MSG }} |
          | **SuSFS4KSU** | \`${{ env.SUSFS_COMMIT_SHORT }}\` | $(date) | ${{ env.SUSFS_COMMIT_MSG }} |

          ---
          EOF

          echo "CHANGELOG_FILE=$CHANGELOG_FILE" >> $GITHUB_ENV

      - name: Setup SuSFS
        if: env.ENABLE_SUSFS == 'true'
        run: |
          cp susfs4ksu/kernel_patches/fs/susfs.c kernel/fs/
          cp susfs4ksu/kernel_patches/include/linux/susfs.h kernel/include/linux/
          cp susfs4ksu/kernel_patches/include/linux/susfs_def.h kernel/include/linux/

          cd kernel

          # Apply core SuSFS patch (android16-6.12)
          VARIANT_SUSFS_PATCH="../.github/patches/${{ matrix.variant }}/50_add_susfs_in_gki-android16-6.12.patch"
          DEFAULT_SUSFS_PATCH="../susfs4ksu/kernel_patches/50_add_susfs_in_gki-android16-6.12.patch"

          if [ -f "$VARIANT_SUSFS_PATCH" ]; then
            echo "📋 Applying CUSTOM core SuSFS patch from .github/patches/${{ matrix.variant }}/..."
            patch -p1 --forward < "$VARIANT_SUSFS_PATCH" || echo "⚠️ Patch failed or already applied."
          else
            echo "📋 Applying DEFAULT core SuSFS patch..."
            patch -p1 --forward < "$DEFAULT_SUSFS_PATCH" || echo "⚠️ Patch failed or already applied."
          fi

          # Apply KSU-specific SuSFS patch
          # resukisu has SuSFS pre-integrated — skip the 10_ patch for it.
          if [ "${{ matrix.variant }}" != "resukisu" ]; then
            cd KernelSU

            VARIANT_KSU_PATCH="../../.github/patches/${{ matrix.variant }}/10_enable_susfs_for_ksu.patch"
            DEFAULT_KSU_PATCH="../../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch"

            if [ -f "$VARIANT_KSU_PATCH" ]; then
              echo "📋 Applying CUSTOM 10_enable_susfs_for_ksu patch..."
              patch -p1 --forward < "$VARIANT_KSU_PATCH" || echo "⚠️ KSU SuSFS Patch failed or already applied."
            else
              echo "📋 Applying DEFAULT 10_enable_susfs_for_ksu patch..."
              patch -p1 --forward < "$DEFAULT_KSU_PATCH" || echo "⚠️ KSU SuSFS Patch failed or already applied."
            fi

            cd ..
          fi

          # Fallback for ALL variants: ensure fs/exec.c has susfs_def.h included.
          # The 50_ patch adds #include <linux/susfs_def.h> to fs/exec.c.
          # susfs_is_current_proc_umounted() is declared in susfs_def.h.
          # If the include hunk failed but the call hunk applied (partial patch),
          # inject it manually — applies to both kowsu and resukisu.
          if grep -q "susfs_is_current_proc_umounted\|susfs_is_current_proc_app_profile" fs/exec.c; then
            if ! grep -q '#include <linux/susfs_def.h>' fs/exec.c; then
              echo "🔧 Injecting missing #include <linux/susfs_def.h> into fs/exec.c..."
              sed -i '/#include <linux\/ksm.h>/a #ifdef CONFIG_KSU_SUSFS\n#include <linux\/susfs_def.h>\n#endif' fs/exec.c
              echo "✅ susfs_def.h injected into fs/exec.c"
            else
              echo "✅ fs/exec.c already has susfs_def.h included"
            fi
          fi

      - name: Apply Remote Patches & Source Fixes
        run: |
          cd kernel

          # 0. Bypass GKI ABI symbol checks
          echo "🚫 Removing GKI protected exports..."
          rm -f android/abi_gki_protected_exports_* || true

          # 1. Spoof kernel version string to match stock OTA kernel exactly.
          # Target uname -r: 6.12.23-android16-5-g6928909e3148-abogki444322847-4k
          # Strategy: silence setlocalversion entirely so it outputs nothing, then
          # set CONFIG_LOCALVERSION to the full suffix we want appended after "6.12.23".
          #
          # setlocalversion normally appends git describe output (+dirty flags etc).
          # We replace the script with a no-op so CONFIG_LOCALVERSION is the sole suffix.
          cat > ./scripts/setlocalversion << 'SETLOCALVERSION_EOF'
          #!/bin/sh
          # Spoofed: outputs nothing so CONFIG_LOCALVERSION controls the full suffix.
          echo ""
          SETLOCALVERSION_EOF
          chmod +x ./scripts/setlocalversion

          # 2. Fix libbpf compilation error (type cast)
          echo "🔧 Patching libbpf.c type casting..."
          sed -i 's/next_path = strchr(s, '"'"':'"'"');/next_path = (char *)strchr(s, '"'"':'"'"');/' \
            tools/lib/bpf/libbpf.c || true

          # NOTE: The OnePlus 12 / SM8650 Wi-Fi patch from the Pixel build has been
          # intentionally removed — it targets a different SoC (SM8650) and will not
          # apply cleanly to the SM8850 / 6.12 tree.

      - name: Configure Kernel
        run: |
          cd kernel
          export ARCH=arm64
          export CROSS_COMPILE="${{ env.ARM64_TOOLCHAIN }}"
          export CROSS_COMPILE_COMPAT="${{ env.ARM32_TOOLCHAIN }}"

          make ARCH=arm64 LLVM=1 LLVM_IAS=1 LD=ld.lld O=out gki_defconfig

          # Append custom configs for SM8850 (Snapdragon 8 Elite Gen 5 / Sun platform)
          # CPU topology: 2x Oryon Gen3 Prime @ 4.6 GHz + 6x Oryon Gen3 Performance @ 3.62 GHz
          # No separate efficiency cluster — all cores are "big", so no SCHED_MC cluster splitting.
          cat << 'EOF' >> out/.config
          CONFIG_ARCH_QCOM=y
          CONFIG_ARM64_VA_BITS=52
          CONFIG_ARM64_PA_BITS=52
          CONFIG_SCHED_MC=y
          CONFIG_ENERGY_MODEL=y
          CONFIG_CPU_FREQ=y
          CONFIG_CPU_FREQ_GOV_SCHEDUTIL=y
          CONFIG_THERMAL=y
          CONFIG_CMA=y
          CONFIG_KPROBES=y
          CONFIG_HAVE_KPROBES=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_NET_SCH_FQ=y
          CONFIG_LTO_CLANG_THIN=y
          CONFIG_IP_SET=y
          CONFIG_NET_SCH_CAKE=y
          CONFIG_KSU=y
          CONFIG_KSU_LSM_SECURITY_HOOKS=y
          CONFIG_LOCALVERSION="-android16-5-g6928909e3148-abogki444322847-4k"
          CONFIG_DEBUG_INFO_BTF=n
          CONFIG_DEBUG_INFO_BTF_MODULES=n
          EOF

          if [ "${{ env.ENABLE_SUSFS }}" = "true" ]; then
            cat << 'EOF' >> out/.config
           # KernelSU SUSFS Configuration
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          EOF
          fi

          make ARCH=arm64 LLVM=1 LLVM_IAS=1 LD=ld.lld O=out olddefconfig

      - name: Build Kernel (Make)
        run: |
          cd kernel
          export ARCH=arm64
          export CROSS_COMPILE="${{ env.ARM64_TOOLCHAIN }}"
          export CROSS_COMPILE_COMPAT="${{ env.ARM32_TOOLCHAIN }}"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CC="ccache clang"
          export CXX="ccache clang++"

          MAKE_JOBS=$(nproc)
          START_TIME=$SECONDS

          export KBUILD_BUILD_USER="kleaf"
          export KBUILD_BUILD_HOST="build-host"
          export KBUILD_BUILD_TIMESTAMP="Fri Sep 12 04:57:41 UTC 2025"

          if [ "${{ env.FORCE_CLEAN }}" = "true" ]; then
            make -j$MAKE_JOBS LLVM=1 LLVM_IAS=1 LD=ld.lld O=out clean
          fi

          make -j$MAKE_JOBS \
            LLVM=1 LLVM_IAS=1 \
            ARCH=arm64 \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE="${{ env.ARM64_TOOLCHAIN }}" \
            CROSS_COMPILE_COMPAT="${{ env.ARM32_TOOLCHAIN }}" \
            CC="$CC" \
            KCFLAGS="-fno-stack-protector" \
            LD=ld.lld \
            HOSTLD=ld.lld \
            O=out

          echo "BUILD_TIME=$((SECONDS - START_TIME))s" >> $GITHUB_ENV

      - name: Package Kernel (AnyKernel3)
        run: |
          cd kernel
          KERNEL_VERSION=$(grep "^VERSION" Makefile | cut -d' ' -f3).$(grep "^PATCHLEVEL" Makefile | cut -d' ' -f3).$(grep "^SUBLEVEL" Makefile | cut -d' ' -f3)
          cd ..

          # WildKernels GKI-2.0 AnyKernel3 — clean GKI-focused fork, no device-check bloat.
          git clone --depth=1 --branch=gki-2.0 https://github.com/WildKernels/AnyKernel3 AnyKernel3

          # Update kernel.string in the existing anykernel.sh to identify this build.
          # gki-2.0 sets do.devicecheck=0 by default — correct for GKI images.
          sed -i "s|kernel.string=.*|kernel.string=GKI ${KERNEL_VERSION} - KernelSU (${{ matrix.variant }}) r${{ env.KSU_VERSION }} for popsicle|" \
            AnyKernel3/anykernel.sh

          cp kernel/out/arch/arm64/boot/Image AnyKernel3/
          [ -f kernel/out/arch/arm64/boot/dtb ] && cp kernel/out/arch/arm64/boot/dtb AnyKernel3/ || true

          cd AnyKernel3 && rm -rf .git .github
          ZIP_NAME="AK3-GKI-${KERNEL_VERSION}-popsicle-${{ matrix.variant }}-r${{ env.KSU_VERSION }}.zip"
          zip -r9 "../$ZIP_NAME" .
          cd ..

          echo "KERNEL_ZIP=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: kernel-popsicle-${{ matrix.variant }}-${{ github.run_number }}
          path: |
            ${{ env.KERNEL_ZIP }}
            ${{ env.CHANGELOG_FILE }}

  create_release:
    needs: [setup, build]
    runs-on: ubuntu-latest
    if: always() && needs.setup.outputs.create_release == 'true' && needs.build.result != 'cancelled'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Create GitHub Release
        run: |
          cd release-assets
          find . -type f -exec mv {} . \; 2>/dev/null || true

          if ! ls *.zip 1> /dev/null 2>&1; then
            echo "❌ No ZIP artifacts found — all matrix builds must have failed. Skipping release."
            exit 0
          fi

          RELEASE_NOTES="**Build Date:** $(date)
          **Device:** Xiaomi 17 Pro Max (popsicle)
          **SoC:** Snapdragon 8 Elite Gen 5 (SM8850-AC)
          **Kernel:** GKI android16-6.12 (2025-05-exp)
          **SuSFS:** ${{ inputs.disable_susfs == true && '❌ Disabled' || '✅ Enabled' }}

          ### Variants
          - kowsu (KOWX712/KernelSU)
          - resukisu (ReSukiSU/ReSukiSU)

          Flash ZIP in Kernel Flasher or extract Image to patch boot.img manually."

          gh release create "popsicle-build-${{ github.run_number }}" \
            --title "GKI 6.12 popsicle Build #${{ github.run_number }}" \
            --notes "$RELEASE_NOTES" \
            --repo "${{ github.repository }}" \
            ./*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: [setup, create_release, build]
    runs-on: ubuntu-latest
    if: always() && inputs.enable_telegram
    steps:
      - name: Send Telegram Notification
        run: |
          STATUS="${{ needs.build.result }}"
          ICON="✅"
          [ "$STATUS" != "success" ] && ICON="⚠️"
          [ "$STATUS" == "failure" ] && ICON="❌"

          IS_CLEAN="${{ inputs.force_clean_build == true && 'Yes' || 'No' }}"
          IS_SUSFS="${{ inputs.disable_susfs == true && 'Disabled' || 'Enabled' }}"
          DO_REL="${{ inputs.create_release == true && 'Yes' || 'No' }}"

          cat << EOF > tg_message.txt
          $ICON <b>Kernel Build ${STATUS^^}</b>
          ━━━━━━━━━━━━━━━━━━━━━
          📱 <b>Target:</b> Xiaomi 17 Pro Max (popsicle)
          💻 <b>SoC:</b> Snapdragon 8 Elite Gen 5 (SM8850-AC)
          🌿 <b>Kernel:</b> GKI android16-6.12 (2025-05-exp)
          🛠️ <b>Variant(s):</b> ${{ inputs.ksu_variant }}
          🛡️ <b>SuSFS:</b> $IS_SUSFS
          🧹 <b>Clean Build:</b> $IS_CLEAN
          📦 <b>Release Created:</b> $DO_REL
          👤 <b>Triggered by:</b> <a href="https://github.com/${{ github.actor }}">${{ github.actor }}</a>

          🔗 <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Run Logs & Artifacts</a>
          EOF

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$(cat tg_message.txt)" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview=true
