name: 🏗️ Build GKI · Popsicle (SM8850)
on:
  workflow_dispatch:
    inputs:
      ksu_variant:
        description: 'KernelSU variant to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - kowsu+susfs
          - kowsu
          - xxksu
      sub_level:
        description: 'Kernel sublevel (e.g. 23 for 6.12.23)'
        required: true
        default: '23'
        type: string
      create_release:
        description: 'Publish a GitHub Release'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  packages: write

jobs:
  # ─────────────────────────────────────────────
  # 1 · SETUP
  # ─────────────────────────────────────────────
  setup:
    name: 🔧 Setup · Resolve Build Config
    runs-on: ubuntu-latest
    outputs:
      release_tag:       ${{ steps.config.outputs.release_tag }}
      kernel_ver:        ${{ steps.config.outputs.kernel_ver }}
      build_kowsu_susfs: ${{ steps.config.outputs.build_kowsu_susfs }}
      build_kowsu:       ${{ steps.config.outputs.build_kowsu }}
      build_xxksu:       ${{ steps.config.outputs.build_xxksu }}
    steps:
      - id: config
        name: Resolve variant flags & release tag
        run: |
          TAG=$(date +'%y%m%d')
          echo "release_tag=${TAG}"                       >> $GITHUB_OUTPUT
          echo "kernel_ver=6.12.${{ inputs.sub_level }}" >> $GITHUB_OUTPUT

          VARIANT="${{ inputs.ksu_variant }}"

          if [[ "$VARIANT" == "all" || "$VARIANT" == "kowsu+susfs" ]]; then
            echo "build_kowsu_susfs=true"  >> $GITHUB_OUTPUT
          else
            echo "build_kowsu_susfs=false" >> $GITHUB_OUTPUT
          fi

          if [[ "$VARIANT" == "all" || "$VARIANT" == "kowsu" ]]; then
            echo "build_kowsu=true"        >> $GITHUB_OUTPUT
          else
            echo "build_kowsu=false"       >> $GITHUB_OUTPUT
          fi

          if [[ "$VARIANT" == "all" || "$VARIANT" == "xxksu" ]]; then
            echo "build_xxksu=true"        >> $GITHUB_OUTPUT
          else
            echo "build_xxksu=false"       >> $GITHUB_OUTPUT
          fi

  # ─────────────────────────────────────────────
  # 2 · BUILD — KowSU + SuSFS
  # ─────────────────────────────────────────────
  build_susfs:
    name: 🛠️ Build · KowSU + SuSFS
    needs: setup
    if: needs.setup.outputs.build_kowsu_susfs == 'true'
    uses: ./.github/workflows/build-susfs.yml
    with:
      sub_level: ${{ inputs.sub_level }}

  # ─────────────────────────────────────────────
  # 3 · BUILD — KowSU (vanilla)
  # ─────────────────────────────────────────────
  build_kowsu:
    name: 🛠️ Build · KowSU
    needs: setup
    if: needs.setup.outputs.build_kowsu == 'true'
    uses: ./.github/workflows/build-kowsu.yml
    with:
      sub_level: ${{ inputs.sub_level }}

  # ─────────────────────────────────────────────
  # 4 · BUILD — xxKSU
  # ─────────────────────────────────────────────
  build_xxksu:
    name: 🛠️ Build · xxKSU
    needs: setup
    if: needs.setup.outputs.build_xxksu == 'true'
    uses: ./.github/workflows/build-xxksu.yml
    with:
      sub_level: ${{ inputs.sub_level }}

  # ─────────────────────────────────────────────
  # 5 · RELEASE
  # ─────────────────────────────────────────────
  release:
    name: 🚀 Release · Publish Artifacts
    needs: [setup, build_susfs, build_kowsu, build_xxksu]
    if: |
      always() &&
      inputs.create_release == true &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VARIANT:    ${{ inputs.ksu_variant }}
      KERNEL_VER: ${{ needs.setup.outputs.kernel_ver }}
      TAG:        ${{ needs.setup.outputs.release_tag }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 📦 Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: 'kernel-*'
          path: release_zips
          merge-multiple: true

      - name: 📝 Compose release body
        id: body
        run: |
          VARIANT="${{ inputs.ksu_variant }}"
          KV="${{ needs.setup.outputs.kernel_ver }}"

          # ── Variant table rows (only for what was built) ─────────────
          ROWS=""

          if [[ "$VARIANT" == "all" || "$VARIANT" == "kowsu+susfs" ]]; then
            ROWS+="| **KowSU + SuSFS** | [KOWX712/KernelSU](https://github.com/KOWX712/KernelSU) | [simonpunk/susfs4ksu · gki-android16-6.12](https://github.com/simonpunk/susfs4ksu/tree/gki-android16-6.12) |\n"
          fi

          if [[ "$VARIANT" == "all" || "$VARIANT" == "kowsu" ]]; then
            ROWS+="| **KowSU** | [KOWX712/KernelSU](https://github.com/KOWX712/KernelSU) | — |\n"
          fi

          if [[ "$VARIANT" == "all" || "$VARIANT" == "xxksu" ]]; then
            ROWS+="| **xxKSU** | [backslashxx/KernelSU](https://github.com/backslashxx/KernelSU) | — |\n"
          fi

          # ── Assemble body ─────────────────────────────────────────────
          cat <<RELEASE_BODY > release_body.md
          ## 📱 Popsicle GKI Kernel — \`${KV}\`
          > **Device:** Xiaomi Popsicle · SM8850 (Snapdragon 8 Elite)
          > **Android:** 16 · GKI \`${KV}\`
          > **Built:** \`$(date -u +'%Y-%m-%d %H:%M UTC')\`

          ---

          ### 🧩 Variants Shipped

          | Variant | KernelSU Source | SuSFS Source |
          |---------|----------------|--------------|
          $(echo -e "$ROWS")
          ---

          ### ✨ Features

          | Feature | Details |
          |---------|---------|
          | 🔒 Root Solution | KernelSU (variant-dependent, see above) |
          | 📂 SuSFS | Filesystem-level su hiding (where applicable) |
          | 🌐 Networking | BBR congestion control · IPSet suite |
          | 🔑 KMI | KMI bypass for extended module compatibility |
          | 📦 Format | AnyKernel3 flashable \`.zip\` |

          ---

          ### 📲 Installation

          1. Boot into a custom recovery (e.g. TWRP) **or** use a root-capable flasher
          2. Flash the \`.zip\` matching your desired variant
          3. Reboot and verify root via the KernelSU app

          > ⚠️ **Back up your current boot image before flashing.**
          > This kernel is provided as-is, without warranty of any kind.

          ---

          ### 🔗 References

          - [KOWX712/KernelSU](https://github.com/KOWX712/KernelSU)
          - [backslashxx/KernelSU](https://github.com/backslashxx/KernelSU)
          - [simonpunk/susfs4ksu](https://github.com/simonpunk/susfs4ksu)
          - [osm0sis/AnyKernel3](https://github.com/osm0sis/AnyKernel3)
          RELEASE_BODY

      - name: 🏷️ Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ needs.setup.outputs.release_tag }}"
          name: "🌟 Popsicle GKI ${{ needs.setup.outputs.kernel_ver }} · ${{ needs.setup.outputs.release_tag }}"
          body_path: release_body.md
          files: release_zips/*.zip
