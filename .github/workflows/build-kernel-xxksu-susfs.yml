name: Build GKI Kernel android16-6.12 xxksu susfs

on:
  workflow_dispatch:
    inputs:
      ksu_variant:
        description: 'KernelSU variant to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - kowsu
          - xxksu
      disable_susfs:
        description: 'Disable SuSFS features'
        required: false
        default: false
        type: boolean
      force_clean_build:
        description: 'Force clean build (ignore cache)'
        required: false
        default: false
        type: boolean
      create_release:
        description: 'Create GitHub Release with artifacts'
        required: false
        default: true
        type: boolean
      android_version:
        description: 'Android version (e.g. android16)'
        required: true
        default: 'android16'
        type: string
      kernel_version:
        description: 'Kernel version (e.g. 6.12)'
        required: true
        default: '6.12'
        type: string
      sub_level:
        description: 'Kernel sublevel (e.g. 23 for 6.12.23)'
        required: true
        default: '23'
        type: string
      os_patch_level:
        description: 'OS patch level (e.g. 2025-05-exp)'
        required: true
        default: '2025-05-exp'
        type: string
      debug:
        description: 'Enable debug output'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

env:
  KERNEL_ROOT: ${{ github.workspace }}/kernel-repo

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      enable_susfs: ${{ steps.config.outputs.enable_susfs }}
      force_clean: ${{ steps.config.outputs.force_clean }}
      build_start_time: ${{ steps.timestamp.outputs.start_time }}
      create_release: ${{ steps.config.outputs.create_release }}
    steps:
      - name: Record Build Start Time
        id: timestamp
        run: |
          echo "WORKFLOW_START_TIME=$(date +%s)" >> $GITHUB_ENV
          START_TIME=$(date +%s)
          echo "start_time=$START_TIME" >> $GITHUB_OUTPUT
          echo "::notice::Workflow started at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: Set Build Matrix
        id: set-matrix
        run: |
          VARIANT="${{ github.event.inputs.ksu_variant }}"
          if [ "$VARIANT" = "all" ]; then
            echo 'matrix={"variant":["kowsu","xxksu"]}' >> $GITHUB_OUTPUT
            echo "🎯 Building all variants: kowsu, xxksu"
          else
            echo "matrix={\"variant\":[\"$VARIANT\"]}" >> $GITHUB_OUTPUT
            echo "🎯 Building single variant: $VARIANT"
          fi

      - name: Set Build Config
        id: config
        run: |
          echo "enable_susfs=${{ github.event.inputs.disable_susfs == 'true' && 'false' || 'true' }}" >> $GITHUB_OUTPUT
          echo "force_clean=${{ github.event.inputs.force_clean_build }}" >> $GITHUB_OUTPUT
          echo "create_release=${{ github.event.inputs.create_release }}" >> $GITHUB_OUTPUT

  build:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    env:
      ENABLE_SUSFS: ${{ needs.setup.outputs.enable_susfs }}
      FORCE_CLEAN: ${{ needs.setup.outputs.force_clean }}
      KSU_VARIANT: ${{ matrix.variant }}

    steps:
      # -----------------------------------------------------------------------
      # 1. Reclaim disk space — kernel source sync needs ~20 GB free
      # -----------------------------------------------------------------------
      - name: Free Disk Space & Install Build Dependencies
        run: |
          echo "=== Disk before cleanup ===" && df -h /

          sudo apt-get purge -yq \
            '^aspnetcore-.*' '^dotnet-.*' '^llvm-.*' \
            'php.*' '^mongodb-.*' '^mysql-.*' \
            azure-cli google-cloud-cli google-chrome-stable \
            firefox powershell mono-devel libgl1-mesa-dri \
            'ghc-*' 'cabal-install' \
            || true

          sudo rm -rf \
            /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/powershell \
            /usr/share/swift /usr/local/.ghcup /usr/lib/jvm \
            /usr/local/graalvm "$AGENT_TOOLSDIRECTORY" \
            || true

          docker image prune -af 2>/dev/null || true
          sudo apt-get autoremove -yq
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

          echo "=== Disk after cleanup ===" && df -h /

          # repo is needed for kernel source sync only.
          # Toolchains are downloaded separately in step 12a.
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison flex libssl-dev libelf-dev \
            build-essential python3 python3-pip \
            rsync curl git zip unzip \
            libncurses-dev gawk dwarves zstd pahole \
            kmod

          echo "depmod version: $(depmod -V)"
          depmod --help 2>&1 | grep -qE '\-d|basedir' \
            && echo "✅ depmod supports -d" \
            || echo "⚠️  depmod may not support -d"

          echo "✅ Host dependencies installed"
          echo "=== Disk after apt install ===" && df -h /

      # -----------------------------------------------------------------------
      # 2. Install repo tool (needed for kernel source sync)
      # -----------------------------------------------------------------------
      - name: Install repo
        run: |
          mkdir -p "$HOME/bin"
          curl -LSs https://storage.googleapis.com/git-repo-downloads/repo \
            -o "$HOME/bin/repo"
          chmod +x "$HOME/bin/repo"
          echo "$HOME/bin" >> $GITHUB_PATH
          git config --global user.email "ci@github.actions"
          git config --global user.name  "GitHub Actions"

      - name: Pre-Clean Build Artifacts
        run: |
          rm -rf AnyKernel3 release-assets changelogs || true

      - name: Checkout Workflow Repo
        uses: actions/checkout@v4
        with:
          clean: false

      # -----------------------------------------------------------------------
      # 3. Sync kernel sources via repo
      
      # -----------------------------------------------------------------------
      - name: Sync Kernel Sources
        run: |
          ANDROID_VERSION="${{ github.event.inputs.android_version }}"
          KERNEL_VERSION="${{ github.event.inputs.kernel_version }}"
          OS_PATCH_LEVEL="${{ github.event.inputs.os_patch_level }}"
          FORMATTED_BRANCH="${ANDROID_VERSION}-${KERNEL_VERSION}-${OS_PATCH_LEVEL}"

          mkdir -p "${{ env.KERNEL_ROOT }}" && cd "${{ env.KERNEL_ROOT }}"
          echo "📦 repo init — branch: common-${FORMATTED_BRANCH}"

          repo init \
            --depth=1 \
            -u https://android.googlesource.com/kernel/manifest \
            -b "common-${FORMATTED_BRANCH}"

          REMOTE_REF=$(git ls-remote \
            https://android.googlesource.com/kernel/common \
            "${FORMATTED_BRANCH}" || true)
          if grep -q deprecated <<< "$REMOTE_REF"; then
            echo "⚠️  Deprecated branch — rewriting manifest"
            sed -i \
              "s/\"${FORMATTED_BRANCH}\"/\"deprecated\/${FORMATTED_BRANCH}\"/g" \
              .repo/manifests/default.xml
          fi

          echo "🔄 repo sync..."
          repo sync \
            -c -j$(nproc --all) \
            --no-tags --fail-fast --force-sync --no-clone-bundle

          echo "✅ Kernel workspace synced" && df -h /
          echo "KERNEL_DIR=${{ env.KERNEL_ROOT }}/common" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # 4. Sync SuSFS source (pinned commit)
      # -----------------------------------------------------------------------
      - name: Sync SuSFS Source
        run: |
          SUSFS_DIR="${{ github.workspace }}/susfs4ksu"
          if [ -d "$SUSFS_DIR/.git" ]; then
            echo "♻️ Existing SuSFS tree found. Resetting to pinned commit..."
            cd "$SUSFS_DIR"
            git fetch --unshallow 2>/dev/null || true
            git fetch origin
            git reset --hard 315af1ddffcfc946cdcc548fd1a51a737e4e9001
            git clean -fdx
          else
            echo "📥 Cloning SuSFS (gki-android16-6.12-dev)..."
            git clone --depth=1 --branch=gki-android16-6.12-dev \
              https://gitlab.com/simonpunk/susfs4ksu "$SUSFS_DIR"
            git -C "$SUSFS_DIR" fetch --unshallow 2>/dev/null || true
            git -C "$SUSFS_DIR" reset --hard 315af1ddffcfc946cdcc548fd1a51a737e4e9001
            git -C "$SUSFS_DIR" clean -fdx
          fi
          echo "SUSFS_DIR=$SUSFS_DIR" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # 5. Store commit info
      # -----------------------------------------------------------------------
      - name: Store Commit Info
        run: |
          read -r W_HASH W_SHORT W_DATE W_MSG << EOF
          $(git log -1 --format="%H %h %cd %s" --date=format:'%Y-%m-%d %H:%M:%S')
          EOF
          echo "WORKFLOW_COMMIT_SHORT=$W_SHORT" >> $GITHUB_ENV
          echo "WORKFLOW_COMMIT_MSG=$W_MSG"     >> $GITHUB_ENV

          cd "${{ env.KERNEL_DIR }}"
          read -r K_HASH K_SHORT K_DATE K_MSG << EOF
          $(git log -1 --format="%H %h %cd %s" --date=format:'%Y-%m-%d %H:%M:%S')
          EOF
          echo "KERNEL_COMMIT_SHORT=$K_SHORT" >> $GITHUB_ENV
          echo "KERNEL_COMMIT_MSG=$K_MSG"     >> $GITHUB_ENV

          cd "${{ env.SUSFS_DIR }}"
          read -r S_HASH S_SHORT S_DATE S_MSG << EOF
          $(git log -1 --format="%H %h %cd %s" --date=format:'%Y-%m-%d %H:%M:%S')
          EOF
          echo "SUSFS_COMMIT_SHORT=$S_SHORT" >> $GITHUB_ENV
          echo "SUSFS_COMMIT_MSG=$S_MSG"     >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # 6. Setup KernelSU variant
      #    - kowsu: direct clone + symlink
      #    - xxksu: setup.sh (handles clone + symlink + Makefile/Kconfig)
      # -----------------------------------------------------------------------
      - name: Setup KernelSU Variant
        run: |
          KSU_SETUP_START=$SECONDS
          cd "${{ env.KERNEL_DIR }}"
          rm -rf KernelSU drivers/kernelsu KernelSU-Next

          case "${{ matrix.variant }}" in
            "kowsu")
              KSU_REPO="KOWX712/KernelSU"
              KSU_BRANCH="master"
              git clone --depth=1 --branch=$KSU_BRANCH \
                https://github.com/$KSU_REPO.git KernelSU
              ln -sf ../KernelSU/kernel drivers/kernelsu
              grep -q "kernelsu" drivers/Makefile \
                || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
              grep -q "kernelsu" drivers/Kconfig \
                || sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
              ;;
            "xxksu")
              # xxKSU setup.sh handles clone + symlink + Makefile/Kconfig wiring
              KSU_REPO="backslashxx/KernelSU"
              KSU_BRANCH="master"
              curl -LSs \
                "https://raw.githubusercontent.com/backslashxx/KernelSU/master/kernel/setup.sh" \
                | bash -s -- master
              ;;

          esac

          echo "KSU_REPO=$KSU_REPO"     >> $GITHUB_ENV
          echo "KSU_BRANCH=$KSU_BRANCH" >> $GITHUB_ENV
          echo "KSU_SETUP_TIME=$((SECONDS - KSU_SETUP_START))s" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # 7. Get KSU version info
      # -----------------------------------------------------------------------
      - name: Get KSU Version Info
        run: |
          cd "${{ env.KERNEL_DIR }}/KernelSU"
          git fetch --unshallow --quiet || git fetch --depth=10000 --quiet || true

          case "${{ matrix.variant }}" in
"xxksu")
              # xxKSU hardcodes version in kernel/Makefile ccflags
              KSU_VERSION=$(grep -oP 'KSU_VERSION=\K[0-9]+' kernel/Makefile \
                2>/dev/null || echo "0")
              if [ "$KSU_VERSION" = "0" ]; then
                KSU_COUNT=$(git rev-list --count HEAD 2>/dev/null || echo "0")
                KSU_VERSION=$((KSU_COUNT + 30000))
              fi
              ;;
            *)
              # kowsu
              KSU_COUNT=$(git rev-list --count HEAD)
              KSU_VERSION=$((KSU_COUNT + 30000))
              ;;
          esac

          read -r KSU_C_HASH KSU_C_SHORT KSU_C_DATE KSU_C_MSG << EOF
          $(git log -1 --format="%H %h %cd %s" --date=format:'%Y-%m-%d %H:%M:%S')
          EOF

          echo "KSU_VERSION=$KSU_VERSION"       >> $GITHUB_ENV
          echo "KSU_COMMIT_SHORT=$KSU_C_SHORT"  >> $GITHUB_ENV
          echo "KSU_COMMIT_MSG=$KSU_C_MSG"      >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # 8. Generate changelog
      # -----------------------------------------------------------------------
      - name: Generate Changelog
        if: needs.setup.outputs.create_release == 'true'
        run: |
          mkdir -p changelogs
          CHANGELOG_FILE="changelogs/CHANGELOG-${{ matrix.variant }}.md"
          cat << EOF > "$CHANGELOG_FILE"
          # 📋 Build Changelog

          **Device:** Xiaomi 17 Pro Max (popsicle)
          **Variant:** ${{ matrix.variant }}
          **Build Number:** #${{ github.run_number }}
          **KernelSU Version:** r${{ env.KSU_VERSION }}
          **SuSFS:** ${{ env.ENABLE_SUSFS == 'true' && 'Enabled' || 'Disabled' }}

          ---
          ## 📖 Component Versions
          | Component | Commit | Summary |
          |-----------|--------|---------|
          | **KernelSU** | \`${{ env.KSU_COMMIT_SHORT }}\` | ${{ env.KSU_COMMIT_MSG }} |
          | **Kernel** | \`${{ env.KERNEL_COMMIT_SHORT }}\` | ${{ env.KERNEL_COMMIT_MSG }} |
          | **SuSFS4KSU** | \`${{ env.SUSFS_COMMIT_SHORT }}\` | ${{ env.SUSFS_COMMIT_MSG }} |
          EOF
          echo "CHANGELOG_FILE=$CHANGELOG_FILE" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # 9. Apply SuSFS patches
      # -----------------------------------------------------------------------
      - name: Setup SuSFS
        if: env.ENABLE_SUSFS == 'true'
        run: |
          cp "${{ env.SUSFS_DIR }}/kernel_patches/fs/susfs.c" \
             "${{ env.KERNEL_DIR }}/fs/"
          cp "${{ env.SUSFS_DIR }}/kernel_patches/include/linux/susfs.h" \
             "${{ env.KERNEL_DIR }}/include/linux/"
          cp "${{ env.SUSFS_DIR }}/kernel_patches/include/linux/susfs_def.h" \
             "${{ env.KERNEL_DIR }}/include/linux/"

          cd "${{ env.KERNEL_DIR }}"

          # Apply core GKI SuSFS patch — prefer variant-specific override
          VARIANT_SUSFS_PATCH="${{ github.workspace }}/.github/patches/${{ matrix.variant }}/50_add_susfs_in_gki-android16-6.12.patch"
          DEFAULT_SUSFS_PATCH="${{ env.SUSFS_DIR }}/kernel_patches/50_add_susfs_in_gki-android16-6.12.patch"

          if [ -f "$VARIANT_SUSFS_PATCH" ]; then
            echo "📋 Applying CUSTOM core SuSFS patch..."
            patch -p1 --forward < "$VARIANT_SUSFS_PATCH" \
              || echo "⚠️ Patch failed or already applied."
          else
            echo "📋 Applying DEFAULT core SuSFS patch..."
            patch -p1 --forward < "$DEFAULT_SUSFS_PATCH" \
              || echo "⚠️ Patch failed or already applied."
          fi

          # Apply KSU-specific SuSFS patch
          # resukisu has SuSFS pre-integrated — skip.
          if [ "${{ matrix.variant }}" != "resukisu" ]; then
            cd KernelSU

            VARIANT_KSU_PATCH="${{ github.workspace }}/.github/patches/${{ matrix.variant }}/10_enable_susfs_for_ksu.patch"
            DEFAULT_KSU_PATCH="${{ env.SUSFS_DIR }}/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch"

            if [ -f "$VARIANT_KSU_PATCH" ]; then
              echo "📋 Applying CUSTOM 10_enable_susfs_for_ksu patch (${{ matrix.variant }})..."
              patch -p1 --forward < "$VARIANT_KSU_PATCH" \
                || { echo "❌ KSU SuSFS patch failed!"; exit 1; }
            else
              echo "📋 Applying DEFAULT 10_enable_susfs_for_ksu patch..."
              patch -p1 --forward < "$DEFAULT_KSU_PATCH" \
                || { echo "❌ KSU SuSFS patch failed!"; exit 1; }
            fi

            cd ..
          fi

          # Ensure fs/exec.c has susfs_def.h if needed
          if grep -q "susfs_is_current_proc_umounted\|susfs_is_current_proc_app_profile" \
              fs/exec.c; then
            if ! grep -q '#include <linux/susfs_def.h>' fs/exec.c; then
              echo "🔧 Injecting #include <linux/susfs_def.h> into fs/exec.c..."
              sed -i '/#include <linux\/ksm.h>/a #ifdef CONFIG_KSU_SUSFS\n#include <linux\/susfs_def.h>\n#endif' \
                fs/exec.c
            fi
          fi

      # -----------------------------------------------------------------------
      # 9b. Apply xxKSU manual hooks patches
      #     These patch security/security.c to add manual hook call sites,
      #     replacing the need for CONFIG_KSU_LSM_SECURITY_HOOKS.
      # -----------------------------------------------------------------------
      - name: Apply Manual Hooks Patches (xxKSU only)
        if: matrix.variant == 'xxksu'
        run: |
          cd "${{ env.KERNEL_DIR }}"
          echo "📋 Applying manual-security-hooks patch..."
          patch -p1 --forward <             "${{ github.workspace }}/.github/patches/gki/manual-security-hooks-v1.8.patch"             || { echo "❌ manual-security-hooks patch failed!"; exit 1; }
          echo "📋 Applying scope-min-hooks patch..."
          patch -p1 --forward <             "${{ github.workspace }}/.github/patches/gki/scope-min-hooks-v1.9.patch"             || { echo "❌ scope-min-hooks patch failed!"; exit 1; }
          echo "✅ Manual hooks patches applied"

      # -----------------------------------------------------------------------
      # 10. Apply source fixes (GKI spoofing patches + libbpf fix)
      # -----------------------------------------------------------------------
      - name: Apply Source Fixes
        run: |
          cd "${{ env.KERNEL_DIR }}"

          echo "🚫 Removing GKI protected exports..."
          rm -f android/abi_gki_protected_exports_* || true

          GKI_PATCH_DIR="${{ github.workspace }}/.github/patches/gki"
          for patch in \
            "$GKI_PATCH_DIR/60_scripts_mkcompile_h.patch" \
            "$GKI_PATCH_DIR/61_scripts_setlocalversion.patch" \
            "$GKI_PATCH_DIR/62_init_Makefile.patch"; do
            if [ -f "$patch" ]; then
              echo "📋 Applying $(basename $patch)..."
              patch -p1 --forward < "$patch" \
                || echo "⚠️ $(basename $patch) failed or already applied."
            else
              echo "❌ Missing patch: $patch"; exit 1
            fi
          done

          # Fix SUBLEVEL
          sed -i \
            "s/^SUBLEVEL = .*/SUBLEVEL = ${{ github.event.inputs.sub_level }}/" \
            Makefile
          echo "✅ SUBLEVEL set to ${{ github.event.inputs.sub_level }}"

          # Fix libbpf type cast
          sed -i \
            's/next_path = strchr(s, '"'"':'"'"');/next_path = (char *)strchr(s, '"'"':'"'"');/' \
            tools/lib/bpf/libbpf.c || true

      # -----------------------------------------------------------------------
      # 11. Write defconfig fragment
      #     (appended to gki_defconfig via Make olddefconfig in step 12b)
      # -----------------------------------------------------------------------
      - name: Write Defconfig Fragment
        run: |
          FRAGMENT="${{ env.KERNEL_DIR }}/arch/arm64/configs/ksu_susfs.fragment"
          : > "$FRAGMENT"

          # ── KernelSU base ────────────────────────────────────────────────
          printf '%s\n' \
            'CONFIG_KSU=y' \
            'CONFIG_KSU_DEBUG=n' \
            >> "$FRAGMENT"

          # ── Variant-specific KSU configs ─────────────────────────────────
          case "${{ matrix.variant }}" in
            "kowsu")
              printf '%s\n' \
                'CONFIG_KSU_KPROBES_HOOK=n' \
                >> "$FRAGMENT"
              ;;
            "xxksu")
              # xxKSU uses manual security hooks (patches applied separately).
              # LSM_SECURITY_HOOKS=n — manual hooks replace LSM hooks.
              # TAMPER_SYSCALL_TABLE=n — GKI 6.12 has CFI_CLANG=y.
              printf '%s\n' \
                'CONFIG_KSU_EXTRAS=y' \
                'CONFIG_KSU_LSM_SECURITY_HOOKS=n' \
                'CONFIG_KSU_THRONE_TRACKER_ALWAYS_THREADED=y' \
                'CONFIG_KSU_TAMPER_SYSCALL_TABLE=n' \
                'CONFIG_KSU_KRETPROBES_SUCOMPAT=n' \
                >> "$FRAGMENT"
              ;;

          esac

          # ── Common kernel options ────────────────────────────────────────
          printf '%s\n' \
            'CONFIG_TMPFS_XATTR=y' \
            'CONFIG_TMPFS_POSIX_ACL=y' \
            'CONFIG_IP_NF_TARGET_TTL=y' \
            'CONFIG_IP6_NF_TARGET_HL=y' \
            'CONFIG_IP6_NF_MATCH_HL=y' \
            'CONFIG_TCP_CONG_ADVANCED=y' \
            'CONFIG_TCP_CONG_BBR=y' \
            'CONFIG_NET_SCH_FQ=y' \
            'CONFIG_TCP_CONG_BIC=n' \
            'CONFIG_TCP_CONG_WESTWOOD=n' \
            'CONFIG_TCP_CONG_HTCP=n' \
            'CONFIG_BPF_STREAM_PARSER=y' \
            'CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y' \
            'CONFIG_NETFILTER_XT_SET=y' \
            'CONFIG_IP_SET=y' \
            'CONFIG_IP_SET_MAX=65534' \
            'CONFIG_IP_SET_BITMAP_IP=y' \
            'CONFIG_IP_SET_BITMAP_IPMAC=y' \
            'CONFIG_IP_SET_BITMAP_PORT=y' \
            'CONFIG_IP_SET_HASH_IP=y' \
            'CONFIG_IP_SET_HASH_IPMARK=y' \
            'CONFIG_IP_SET_HASH_IPPORT=y' \
            'CONFIG_IP_SET_HASH_IPPORTIP=y' \
            'CONFIG_IP_SET_HASH_IPPORTNET=y' \
            'CONFIG_IP_SET_HASH_IPMAC=y' \
            'CONFIG_IP_SET_HASH_MAC=y' \
            'CONFIG_IP_SET_HASH_NETPORTNET=y' \
            'CONFIG_IP_SET_HASH_NET=y' \
            'CONFIG_IP_SET_HASH_NETNET=y' \
            'CONFIG_IP_SET_HASH_NETPORT=y' \
            'CONFIG_IP_SET_HASH_NETIFACE=y' \
            'CONFIG_IP_SET_LIST_SET=y' \
            'CONFIG_IP6_NF_NAT=y' \
            'CONFIG_IP6_NF_TARGET_MASQUERADE=y' \
            >> "$FRAGMENT"

          # ── SuSFS ────────────────────────────────────────────────────────
          if [ "${{ env.ENABLE_SUSFS }}" = "true" ]; then
            printf '%s\n' \
              'CONFIG_KSU_SUSFS=y' \
              'CONFIG_KSU_SUSFS_SUS_PATH=y' \
              'CONFIG_KSU_SUSFS_SUS_MOUNT=y' \
              'CONFIG_KSU_SUSFS_SUS_KSTAT=y' \
              'CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n' \
              'CONFIG_KSU_SUSFS_SPOOF_UNAME=y' \
              'CONFIG_KSU_SUSFS_ENABLE_LOG=y' \
              'CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y' \
              'CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y' \
              'CONFIG_KSU_SUSFS_OPEN_REDIRECT=y' \
              'CONFIG_KSU_SUSFS_SUS_MAP=y' \
              'CONFIG_KSU_SUSFS_SUS_SU=n' \
              >> "$FRAGMENT"
          fi

          echo "📝 Fragment written:" && cat "$FRAGMENT"
          echo "FRAGMENT=$FRAGMENT" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # 12a. Download toolchains (needed for Make build)
      # -----------------------------------------------------------------------
      - name: Download Clang Toolchain
        run: |
          mkdir -p $HOME/clang && cd $HOME/clang
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r536225.tar.gz -O clang.tar.gz
          tar -xzf clang.tar.gz && rm clang.tar.gz
          echo "✅ $(bin/clang --version | head -1)"
          echo "CLANG_BIN=$HOME/clang/bin" >> $GITHUB_ENV
          echo "$HOME/clang/bin" >> $GITHUB_PATH

      - name: Download AArch64 GNU Toolchain
        run: |
          mkdir -p $HOME/toolchains && cd $HOME/toolchains
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/14.3.rel1/binrel/arm-gnu-toolchain-14.3.rel1-x86_64-aarch64-none-linux-gnu.tar.xz -O tc.tar.xz
          tar -xJf tc.tar.xz && rm tc.tar.xz
          TC_DIR=$(ls -d arm-gnu-toolchain-*aarch64*)
          echo "ARM64_TOOLCHAIN=$HOME/toolchains/$TC_DIR/bin/aarch64-none-linux-gnu-" >> $GITHUB_ENV
          echo "✅ AArch64 toolchain: $TC_DIR"

      - name: Download ARM32 GNU Toolchain
        run: |
          mkdir -p $HOME/toolchains && cd $HOME/toolchains
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/14.3.rel1/binrel/arm-gnu-toolchain-14.3.rel1-x86_64-arm-none-eabi.tar.xz -O tc-arm.tar.xz
          tar -xJf tc-arm.tar.xz && rm tc-arm.tar.xz
          TC_DIR=$(ls -d arm-gnu-toolchain-*arm-none-eabi*)
          echo "ARM32_TOOLCHAIN=$HOME/toolchains/$TC_DIR/bin/arm-none-eabi-" >> $GITHUB_ENV
          echo "✅ ARM32 toolchain: $TC_DIR"

      # -----------------------------------------------------------------------
      # 12b. Configure kernel (gki_defconfig + fragment + olddefconfig)
      # -----------------------------------------------------------------------
      - name: Configure Kernel
        run: |
          cd "${{ env.KERNEL_DIR }}"
          export ARCH=arm64
          export CROSS_COMPILE="${{ env.ARM64_TOOLCHAIN }}"
          export CROSS_COMPILE_COMPAT="${{ env.ARM32_TOOLCHAIN }}"

          make ARCH=arm64 LLVM=1 LLVM_IAS=1 LD=ld.lld O=out gki_defconfig

          # Append fragment configs
          cat "${{ env.FRAGMENT }}" >> out/.config

          # Append fixed configs not in fragment
          cat << 'EOF' >> out/.config
          CONFIG_LOCALVERSION="-android16-5-g6928909e3148-abogki444322847-4k"
          CONFIG_DEBUG_INFO_BTF=n
          CONFIG_DEBUG_INFO_BTF_MODULES=n
          EOF

          make ARCH=arm64 LLVM=1 LLVM_IAS=1 LD=ld.lld O=out olddefconfig

      # -----------------------------------------------------------------------
      # 12c. Build kernel with Make
      # -----------------------------------------------------------------------
      - name: Build Kernel (Make)
        run: |
          cd "${{ env.KERNEL_DIR }}"
          export ARCH=arm64
          export CROSS_COMPILE="${{ env.ARM64_TOOLCHAIN }}"
          export CROSS_COMPILE_COMPAT="${{ env.ARM32_TOOLCHAIN }}"

          MAKE_JOBS=$(nproc)
          START=$SECONDS

          if [[ "${{ env.FORCE_CLEAN }}" == "true" ]]; then
            make -j$MAKE_JOBS LLVM=1 LLVM_IAS=1 LD=ld.lld O=out clean
          fi

          make -j$MAKE_JOBS \
            LLVM=1 LLVM_IAS=1 \
            ARCH=arm64 \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE="${{ env.ARM64_TOOLCHAIN }}" \
            CROSS_COMPILE_COMPAT="${{ env.ARM32_TOOLCHAIN }}" \
            CC="clang" \
            LD=ld.lld \
            HOSTLD=ld.lld \
            O=out

          echo "BUILD_TIME=$((SECONDS - START))s" >> $GITHUB_ENV
          echo "✅ Build complete in $((SECONDS - START))s"
          ls -lh out/arch/arm64/boot/

          echo "DIST_DIR=${{ env.KERNEL_DIR }}/out/arch/arm64/boot" >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # 13. Verify build artifacts
      # -----------------------------------------------------------------------
      - name: Verify Build Artifacts
        run: |
          set -e
          if [ -f "${{ env.DIST_DIR }}/Image" ]; then
            echo "✅ Image ($(du -h "${{ env.DIST_DIR }}/Image" | cut -f1))"
          else
            echo "❌ Missing: Image"; exit 1
          fi

          # Check for dtb
          [ -f "${{ env.DIST_DIR }}/dtb" ] \
            && echo "✅ dtb found" \
            || echo "ℹ️  No dtb (GKI-only build)"

      # -----------------------------------------------------------------------
      # 14. Package into AnyKernel3 zip
      # -----------------------------------------------------------------------
      - name: Package Kernel (AnyKernel3)
        run: |
          KERNEL_VERSION="${{ github.event.inputs.kernel_version }}.${{ github.event.inputs.sub_level }}"

          git clone --depth=1 --branch=gki-2.0 \
            https://github.com/WildKernels/AnyKernel3 AnyKernel3

          sed -i \
            "s|kernel.string=.*|kernel.string=GKI ${KERNEL_VERSION} - KernelSU (${{ matrix.variant }}) r${{ env.KSU_VERSION }} for popsicle|" \
            AnyKernel3/anykernel.sh

          cp "${{ env.DIST_DIR }}/Image" AnyKernel3/
          [ -f "${{ env.DIST_DIR }}/dtb" ] \
            && cp "${{ env.DIST_DIR }}/dtb" AnyKernel3/ || true

          cd AnyKernel3 && rm -rf .git .github
          ZIP_NAME="AK3-GKI-${KERNEL_VERSION}-popsicle-${{ matrix.variant }}-r${{ env.KSU_VERSION }}.zip"
          zip -r9 "../$ZIP_NAME" .
          cd ..

          echo "KERNEL_ZIP=$ZIP_NAME" >> $GITHUB_ENV
          echo "📦 Packaged: $ZIP_NAME"

      # -----------------------------------------------------------------------
      # 15. Upload artifacts
      # -----------------------------------------------------------------------
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-popsicle-${{ matrix.variant }}-${{ github.run_number }}
          path: |
            ${{ env.KERNEL_ZIP }}
            ${{ env.CHANGELOG_FILE }}
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # create_release
  # ---------------------------------------------------------------------------
  create_release:
    needs: [setup, build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >
      always() &&
      needs.setup.outputs.create_release == 'true' &&
      needs.build.result != 'cancelled'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Resolve Release Tag
        id: release_tag
        run: |
          BUILD_NUM="${{ github.run_number }}"
          echo "release_tag=popsicle-build-${BUILD_NUM}" >> $GITHUB_OUTPUT
          echo "📌 Release tag: popsicle-build-${BUILD_NUM}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        run: |
          cd release-assets
          find . -type f -name "*.zip" -exec mv {} . \; 2>/dev/null || true

          if ! ls *.zip 1>/dev/null 2>&1; then
            echo "❌ No ZIP artifacts found — skipping release."
            exit 0
          fi

          RELEASE_TAG="${{ steps.release_tag.outputs.release_tag }}"

          RELEASE_NOTES="**Build Date:** $(date -u '+%Y-%m-%d %H:%M UTC')
          **Device:** Xiaomi 17 Pro Max (popsicle)
          **SoC:** Snapdragon 8 Elite Gen 5 (SM8850-AC)
          **Kernel:** GKI ${{ github.event.inputs.android_version }}-${{ github.event.inputs.kernel_version }} (${{ github.event.inputs.kernel_version }}.${{ github.event.inputs.sub_level }} / ${{ github.event.inputs.os_patch_level }})
          **Build System:** Make (LLVM/Clang)
          **SuSFS:** ${{ github.event.inputs.disable_susfs == 'true' && '❌ Disabled' || '✅ Enabled' }}

          ### Variants
          - **kowsu** — KOWX712/KernelSU
          - **xxksu** — backslashxx/KernelSU (no LKM, manual hooks)

          ### Installation
          Flash ZIP via Kernel Flasher, or extract \`Image\` and patch \`boot.img\` manually."

          gh release create "$RELEASE_TAG" \
            --title "GKI ${{ github.event.inputs.kernel_version }}.${{ github.event.inputs.sub_level }} popsicle Build #${{ github.run_number }}" \
            --notes "$RELEASE_NOTES" \
            --repo "${{ github.repository }}" \
            ./*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
