name: Build GKI Kernel android16-6.12 xxksu susfs

on:
  workflow_dispatch:
    inputs:
      ksu_variant:
        description: 'KernelSU variant to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - kowsu
          - xxksu
      disable_susfs:
        description: 'Disable SuSFS features'
        required: false
        default: false
        type: boolean
      force_clean_build:
        description: 'Force clean build (ignore cache)'
        required: false
        default: false
        type: boolean
      create_release:
        description: 'Create GitHub Release with artifacts'
        required: false
        default: true
        type: boolean
      sub_level:
        description: 'Kernel sublevel (e.g. 23 for 6.12.23)'
        required: true
        default: '23'
        type: string

permissions:
  contents: write
  packages: write

env:
  KERNEL_ROOT: ${{ github.workspace }}/kernel-repo

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      enable_susfs: ${{ steps.config.outputs.enable_susfs }}
      force_clean: ${{ steps.config.outputs.force_clean }}
      create_release: ${{ steps.config.outputs.create_release }}
    steps:
      - name: Set Build Matrix
        id: set-matrix
        run: |
          VARIANT="${{ github.event.inputs.ksu_variant }}"
          if [ "$VARIANT" = "all" ]; then
            echo 'matrix={"variant":["kowsu","xxksu"]}' >> $GITHUB_OUTPUT
          else
            echo "matrix={\"variant\":[\"$VARIANT\"]}" >> $GITHUB_OUTPUT
          fi

      - name: Set Build Config
        id: config
        run: |
          echo "enable_susfs=${{ github.event.inputs.disable_susfs == 'true' && 'false' || 'true' }}" >> $GITHUB_OUTPUT
          echo "force_clean=${{ github.event.inputs.force_clean_build }}" >> $GITHUB_OUTPUT
          echo "create_release=${{ github.event.inputs.create_release }}" >> $GITHUB_OUTPUT

  build:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    env:
      ENABLE_SUSFS: ${{ needs.setup.outputs.enable_susfs }}
      FORCE_CLEAN: ${{ needs.setup.outputs.force_clean }}
      KSU_VARIANT: ${{ matrix.variant }}

    steps:
      - name: Free Disk Space & Install Build Dependencies
        run: |
          sudo apt-get purge -yq '^aspnetcore-.*' '^dotnet-.*' '^llvm-.*' 'php.*' '^mongodb-.*' '^mysql-.*' azure-cli google-cloud-cli google-chrome-stable firefox powershell mono-devel libgl1-mesa-dri 'ghc-*' 'cabal-install' || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup /usr/lib/jvm /usr/local/graalvm "$AGENT_TOOLSDIRECTORY" || true
          docker image prune -af 2>/dev/null || true
          sudo apt-get autoremove -yq
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends bc bison flex libssl-dev libelf-dev libdw-dev build-essential python3 python3-pip rsync curl git zip unzip libncurses-dev gawk dwarves zstd pahole kmod aria2

      - name: Checkout Workflow Repo
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Download Clang 19 Toolchain
        run: |
          echo "🚀 Downloading Clang 19..."
          mkdir -p $HOME/clang19
          
          aria2c -s16 -x16 -k1M --download-result=hide --summary-interval=0 \
            "https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang19-r536225/clang-r536225.zip" \
            -o clang.zip
          
          echo "📦 Extracting..."
          unzip -q clang.zip -d $HOME/clang19
          rm -f clang.zip
          
          echo "CLANG_BIN=$HOME/clang19/bin" >> $GITHUB_ENV
          echo "$HOME/clang19/bin" >> $GITHUB_PATH

      - name: Download AArch64 GNU Toolchain
        run: |
          mkdir -p $HOME/toolchains && cd $HOME/toolchains
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/14.3.rel1/binrel/arm-gnu-toolchain-14.3.rel1-x86_64-aarch64-none-linux-gnu.tar.xz -O tc.tar.xz
          tar -xJf tc.tar.xz && rm tc.tar.xz
          echo "ARM64_TOOLCHAIN=$HOME/toolchains/$(ls -d arm-gnu-toolchain-*aarch64*)/bin/aarch64-none-linux-gnu-" >> $GITHUB_ENV

      - name: Download ARM32 GNU Toolchain
        run: |
          mkdir -p $HOME/toolchains && cd $HOME/toolchains
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/14.3.rel1/binrel/arm-gnu-toolchain-14.3.rel1-x86_64-arm-none-eabi.tar.xz -O tc-arm.tar.xz
          tar -xJf tc-arm.tar.xz && rm tc-arm.tar.xz
          echo "ARM32_TOOLCHAIN=$HOME/toolchains/$(ls -d arm-gnu-toolchain-*arm-none-eabi*)/bin/arm-none-eabi-" >> $GITHUB_ENV

      - name: Sync kernel sources (GKI SM8850)
        run: |
          mkdir -p "${{ env.KERNEL_ROOT }}" && cd "${{ env.KERNEL_ROOT }}"
          aria2c -s16 -x16 -k1M https://github.com/cctv18/android_gki_kernel_common/archive/refs/heads/android16-6.12-2025-06.zip -o common.zip
          unzip -q common.zip
          mv "android_gki_kernel_common-android16-6.12-2025-06" common
          rm -f common.zip
          echo "KERNEL_DIR=${{ env.KERNEL_ROOT }}/common" >> $GITHUB_ENV

      - name: Sync SuSFS Source
        run: |
          SUSFS_DIR="${{ github.workspace }}/susfs4ksu"
          git clone --depth=1 --branch=gki-android16-6.12-dev https://gitlab.com/simonpunk/susfs4ksu "$SUSFS_DIR"
          echo "SUSFS_DIR=$SUSFS_DIR" >> $GITHUB_ENV

      - name: Setup KernelSU Variant
        run: |
          cd "${{ env.KERNEL_DIR }}"
          case "${{ matrix.variant }}" in
            "kowsu")
              git clone --depth=1 https://github.com/KOWX712/KernelSU.git KernelSU
              ln -sf ../KernelSU/kernel drivers/kernelsu
              if ! grep -q "kernelsu/" drivers/Makefile; then
                echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
              fi
              if ! grep -q "drivers/kernelsu/Kconfig" drivers/Kconfig; then
                sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
              fi
              ;;
            "xxksu")
              curl -LSs "https://raw.githubusercontent.com/backslashxx/KernelSU/master/kernel/setup.sh" | bash -s -- master
              ;;
          esac

      - name: Create Python Patch Healer
        run: |
          cat << 'EOF' > "${{ env.KERNEL_DIR }}/heal_patch.py"
          import sys
          with open(sys.argv[1], 'r', encoding='utf-8') as f: lines = f.read().splitlines()
          with open(sys.argv[1], 'w', encoding='utf-8', newline='\n') as f:
              in_hunk = False
              for line in lines:
                  if line.startswith('@@ '): in_hunk = True; f.write(line + '\n'); continue
                  if line.startswith(('--- ', '+++ ')): in_hunk = False; f.write(line + '\n'); continue
                  if not in_hunk: f.write(line + '\n'); continue
                  if len(line) == 0: f.write(' \n')
                  elif line[0] not in ['+', '-', ' ', '\\']: f.write(' ' + line + '\n')
                  else: f.write(line + '\n')
          EOF

      - name: Copy SuSFS Base Files
        if: env.ENABLE_SUSFS == 'true' || matrix.variant == 'xxksu'
        run: |
          cp "${{ env.SUSFS_DIR }}/kernel_patches/fs/susfs.c" "${{ env.KERNEL_DIR }}/fs/"
          cp "${{ env.SUSFS_DIR }}/kernel_patches/include/linux/susfs.h" "${{ env.KERNEL_DIR }}/include/linux/"
          cp "${{ env.SUSFS_DIR }}/kernel_patches/include/linux/susfs_def.h" "${{ env.KERNEL_DIR }}/include/linux/"

      - name: Patch 1 - Standard SuSFS
        if: env.ENABLE_SUSFS == 'true' || matrix.variant == 'xxksu'
        run: |
          cd "${{ env.KERNEL_DIR }}"
          patch -p1 < "${{ env.SUSFS_DIR }}/kernel_patches/50_add_susfs_in_gki-android16-6.12.patch" || {
            echo "❌ PATCH 1 FAILED! Dumping reject files:"
            find . -name "*.rej" -exec cat {} +
            exit 1
          }

      - name: Patch 2 - xxKSU SuSFS Compat
        if: env.ENABLE_SUSFS == 'true' || matrix.variant == 'xxksu'
        run: |
          cd "${{ env.KERNEL_DIR }}"
          python3 heal_patch.py "${{ github.workspace }}/.github/patches/xxksu/xxksu_susfs_compat.patch"
          patch -p1 -l --fuzz=3 < "${{ github.workspace }}/.github/patches/xxksu/xxksu_susfs_compat.patch" || {
            echo "❌ PATCH 2 FAILED! Dumping reject files:"
            find . -name "*.rej" -exec cat {} +
            exit 1
          }

      - name: Patch 3 - Manual Security Hooks
        if: matrix.variant == 'xxksu'
        run: |
          cd "${{ env.KERNEL_DIR }}"
          python3 heal_patch.py "${{ github.workspace }}/.github/patches/xxksu/manual-security-hooks-v1.8.patch"
          patch -p1 -l --fuzz=3 < "${{ github.workspace }}/.github/patches/xxksu/manual-security-hooks-v1.8.patch" || {
            echo "❌ PATCH 3 FAILED! Dumping reject files:"
            find . -name "*.rej" -exec cat {} +
            exit 1
          }

      - name: Patch 4 - Scope Min Hooks
        if: matrix.variant == 'xxksu'
        run: |
          cd "${{ env.KERNEL_DIR }}"
          python3 heal_patch.py "${{ github.workspace }}/.github/patches/xxksu/scope-min-hooks-v1.9.patch"
          patch -p1 -l --fuzz=3 < "${{ github.workspace }}/.github/patches/xxksu/scope-min-hooks-v1.9.patch" || {
            echo "❌ PATCH 4 FAILED! Dumping reject files:"
            find . -name "*.rej" -exec cat {} +
            exit 1
          }

      - name: Patch 5 - KernelSU SuSFS Enable
        if: matrix.variant == 'xxksu'
        run: |
          cd "${{ env.KERNEL_DIR }}/KernelSU"
          python3 ../heal_patch.py "${{ github.workspace }}/.github/patches/xxksu/10_enable_susfs_for_ksu.patch"
          patch -p1 -l --fuzz=3 < "${{ github.workspace }}/.github/patches/xxksu/10_enable_susfs_for_ksu.patch" || {
            echo "❌ PATCH 5 FAILED! Dumping reject files:"
            find . -name "*.rej" -exec cat {} +
            exit 1
          }

      - name: Apply Source Fixes
        run: |
          cd "${{ env.KERNEL_DIR }}"
          sed -i "s/^SUBLEVEL = .*/SUBLEVEL = ${{ github.event.inputs.sub_level }}/" Makefile
          
          # Fix libbpf type cast error
          sed -i 's/next_path = strchr(s, '"'"':'"'"');/next_path = (char *)strchr(s, '"'"':'"'"');/' tools/lib/bpf/libbpf.c || true

          # Fix KernelSU Linker Errors by disabling LTO and data sections for the KSU module
          echo "ccflags-y += -fno-lto -fno-data-sections -fno-function-sections" >> drivers/kernelsu/Makefile


      - name: Write Defconfig Fragment
        run: |
          FRAGMENT="${{ env.KERNEL_DIR }}/arch/arm64/configs/ksu_susfs.fragment"
          printf 'CONFIG_KSU=y\nCONFIG_KSU_DEBUG=n\n' > "$FRAGMENT"
          printf 'CONFIG_DEBUG_INFO_BTF=n\nCONFIG_DEBUG_INFO_BTF_MODULES=n\n' > "$FRAGMENT"
          printf 'CONFIG_LTO_NONE=y\n' >> "$FRAGMENT"
          printf 'CONFIG_LTO_CLANG=n\n' >> "$FRAGMENT"

          if [ "${{ matrix.variant }}" = "xxksu" ]; then
            printf 'CONFIG_KSU_EXTRAS=y\nCONFIG_KSU_LSM_SECURITY_HOOKS=n\nCONFIG_KSU_TAMPER_SYSCALL_TABLE=n\n' >> "$FRAGMENT"
          fi
          if [ "${{ env.ENABLE_SUSFS }}" = "true" ]; then
            printf 'CONFIG_KSU_SUSFS=y\nCONFIG_KSU_SUSFS_SUS_PATH=y\nCONFIG_KSU_SUSFS_SUS_MOUNT=y\n' >> "$FRAGMENT"
          fi
          echo "FRAGMENT=$FRAGMENT" >> $GITHUB_ENV

      - name: Configure and Build Kernel
        run: |
          cd "${{ env.KERNEL_DIR }}"
          export ARCH=arm64
          export CROSS_COMPILE="${{ env.ARM64_TOOLCHAIN }}"
          export CROSS_COMPILE_COMPAT="${{ env.ARM32_TOOLCHAIN }}"
          make ARCH=arm64 LLVM=1 O=out gki_defconfig
          cat "${{ env.FRAGMENT }}" >> out/.config
          make ARCH=arm64 LLVM=1 O=out olddefconfig
          make -j$(nproc) ARCH=arm64 LLVM=1 O=out
          echo "DIST_DIR=${{ env.KERNEL_DIR }}/out/arch/arm64/boot" >> $GITHUB_ENV

      - name: Package Kernel (AnyKernel3)
        run: |
          git clone --depth=1 --branch=gki-2.0 https://github.com/WildKernels/AnyKernel3 AnyKernel3
          cp "${{ env.DIST_DIR }}/Image" AnyKernel3/
          cd AnyKernel3 && zip -r9 "../AK3-OKI-SM8850-${{ matrix.variant }}.zip" .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ matrix.variant }}
          path: "*.zip"

  create_release:
    needs: [setup, build]
    runs-on: ubuntu-latest
    if: always() && needs.setup.outputs.create_release == 'true'
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Create GitHub Release
        run: |
          find release-assets -type f -name "*.zip" -exec mv {} . \;
          if ! ls *.zip >/dev/null 2>&1; then exit 0; fi
          
          cat << 'EOF' > release_notes.md
          ### OKI SM8850 Kernel
          - **Source:** OnePlus SM8850 (6.12)
          - **SuSFS:** ${{ github.event.inputs.disable_susfs == 'true' && 'Disabled' || 'Enabled' }}
          - **Clang:** r536225
          EOF

          gh release create "oki-sm8850-${{ github.run_number }}" \
            --title "OKI SM8850 Build #${{ github.run_number }}" \
            --notes-file release_notes.md \
            ./*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
