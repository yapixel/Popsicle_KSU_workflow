name: Build Kernel android16-6.12 - xxKSU - Xiaomi 17 Pro Max (popsicle)

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android version (e.g. android16)'
        required: true
        default: 'android16'
        type: string
      kernel_version:
        description: 'Kernel version (e.g. 6.12)'
        required: true
        default: '6.12'
        type: string
      sub_level:
        description: 'Kernel sublevel (e.g. 23 for 6.12.23)'
        required: true
        default: '23'
        type: string
      os_patch_level:
        description: 'OS patch level (e.g. 2025-05-exp)'
        required: true
        default: '2025-05-exp'
        type: string
      kernel_source:
        description: 'Kernel source(s) to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - gki
          - oki
          - oss
      force_clean_build:
        description: 'Force clean build (ignore cache)'
        required: false
        default: false
        type: boolean
      create_release:
        description: 'Create GitHub Release with artifacts'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  packages: write

env:
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  KERNEL_ROOT: ${{ github.workspace }}/kernel-repo
  SCRIPTS_REPO: https://github.com/TheSillyOk/sh
  KSU_BRANCH: master

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Compute source matrix
        id: set-matrix
        run: |
          INPUT="${{ github.event.inputs.kernel_source }}"
          if [ "$INPUT" = "all" ]; then
            echo 'matrix=["gki","oki","oss"]' >> "$GITHUB_OUTPUT"
          else
            echo "matrix=[\"$INPUT\"]" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix:
        source: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout Workflow Repo
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Free Disk Space & Install Build Dependencies
        run: |
          echo "=== Disk before cleanup ==="
          df -h /

          sudo apt-get purge -yq \
            '^aspnetcore-.*' '^dotnet-.*' '^llvm-.*' \
            'php.*' '^mongodb-.*' '^mysql-.*' \
            azure-cli google-cloud-cli google-chrome-stable \
            firefox powershell mono-devel libgl1-mesa-dri \
            'ghc-*' 'cabal-install' \
            || true

          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/powershell \
            /usr/share/swift \
            /usr/local/.ghcup \
            /usr/lib/jvm \
            /usr/local/graalvm \
            "$AGENT_TOOLSDIRECTORY"

          docker image prune -af 2>/dev/null || true

          sudo apt-get autoremove -yq
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

          echo "=== Disk after cleanup ==="
          df -h /

          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison flex libssl-dev libelf-dev \
            build-essential binutils-aarch64-linux-gnu \
            python3 python3-pip rsync \
            ccache curl zip unzip git aria2 \
            libncurses-dev gawk openssl \
            dwarves zstd pahole
          echo "✅ Dependencies installed"

          # Install repo tool (only needed for GKI, installed unconditionally)
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
          chmod a+x /usr/local/bin/repo
          echo "✅ repo $(repo --version 2>&1 | head -1) installed"

          echo "=== Disk after apt install ==="
          df -h /

      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-xxksu-${{ matrix.source }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ccache-xxksu-${{ matrix.source }}-${{ github.ref_name }}-
            ccache-xxksu-${{ matrix.source }}-

      - name: Configure ccache
        run: |
          ccache --max-size=5G
          ccache --set-config=compression=true
          ccache --set-config=compression_level=1
          echo "ccache version: $(ccache --version | head -1)"

      - name: Download Clang Toolchain (r536225 / clang 19.0.1)
        run: |
          mkdir -p $HOME/clang && cd $HOME/clang
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r536225.tar.gz -O clang.tar.gz
          tar -xzf clang.tar.gz && rm clang.tar.gz
          echo "✅ $(bin/clang --version | head -1)"
          echo "CLANG_BIN=$HOME/clang/bin" >> $GITHUB_ENV
          echo "$HOME/clang/bin" >> $GITHUB_PATH

      - name: Download AArch64 GNU Toolchain (14.3.rel1)
        run: |
          mkdir -p $HOME/toolchains && cd $HOME/toolchains
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/14.3.rel1/binrel/arm-gnu-toolchain-14.3.rel1-x86_64-aarch64-none-linux-gnu.tar.xz -O tc.tar.xz
          tar -xJf tc.tar.xz && rm tc.tar.xz
          TC_DIR=$(ls -d arm-gnu-toolchain-*aarch64*)
          echo "ARM64_TOOLCHAIN=$HOME/toolchains/$TC_DIR/bin/aarch64-none-linux-gnu-" >> $GITHUB_ENV
          echo "✅ AArch64 toolchain: $TC_DIR"

      - name: Download ARM32 GNU Toolchain (14.3.rel1)
        run: |
          mkdir -p $HOME/toolchains && cd $HOME/toolchains
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/14.3.rel1/binrel/arm-gnu-toolchain-14.3.rel1-x86_64-arm-none-eabi.tar.xz -O tc-arm.tar.xz
          tar -xJf tc-arm.tar.xz && rm tc-arm.tar.xz
          TC_DIR=$(ls -d arm-gnu-toolchain-*arm-none-eabi*)
          echo "ARM32_TOOLCHAIN=$HOME/toolchains/$TC_DIR/bin/arm-none-eabi-" >> $GITHUB_ENV
          echo "✅ ARM32 toolchain: $TC_DIR"

      # -----------------------------------------------------------------------
      # Sync kernel sources — strategy differs per matrix.source
      # -----------------------------------------------------------------------

      - name: Sync Kernel Sources (GKI)
        if: matrix.source == 'gki'
        run: |
          ANDROID_VERSION="${{ github.event.inputs.android_version }}"
          KERNEL_VERSION="${{ github.event.inputs.kernel_version }}"
          OS_PATCH_LEVEL="${{ github.event.inputs.os_patch_level }}"
          FORMATTED_BRANCH="${ANDROID_VERSION}-${KERNEL_VERSION}-${OS_PATCH_LEVEL}"

          mkdir -p "${{ env.KERNEL_ROOT }}" && cd "${{ env.KERNEL_ROOT }}"
          echo "📦 repo init — branch: common-${FORMATTED_BRANCH}"

          repo init \
            --depth=1 \
            -u https://android.googlesource.com/kernel/manifest \
            -b "common-${FORMATTED_BRANCH}"

          REMOTE_REF=$(git ls-remote \
            https://android.googlesource.com/kernel/common \
            "${FORMATTED_BRANCH}" || true)
          if grep -q deprecated <<< "$REMOTE_REF"; then
            echo "⚠️  Deprecated branch — rewriting manifest"
            sed -i \
              "s/\"${FORMATTED_BRANCH}\"/\"deprecated\/${FORMATTED_BRANCH}\"/g" \
              .repo/manifests/default.xml
          fi

          echo "🔄 repo sync..."
          repo sync \
            -c -j$(nproc --all) \
            --no-tags --fail-fast --force-sync --no-clone-bundle

          echo "✅ GKI kernel workspace synced" && df -h /
          echo "KERNEL_DIR=${{ env.KERNEL_ROOT }}/common" >> $GITHUB_ENV

      - name: Sync Kernel Sources (OKI)
        if: matrix.source == 'oki'
        run: |
          mkdir -p "${{ env.KERNEL_ROOT }}" && cd "${{ env.KERNEL_ROOT }}"
          echo "📥 Downloading OKI source..."
          aria2c -s16 -x16 -k1M \
            https://github.com/cctv18/android_kernel_common_oneplus_sm8850/archive/refs/heads/oneplus/sm8850_v_16.0.0_oneplus_15.zip \
            -o common.zip
          unzip -q common.zip
          mv "android_kernel_common_oneplus_sm8850-oneplus-sm8850_v_16.0.0_oneplus_15" common
          rm -f common.zip
          echo "KERNEL_DIR=${{ env.KERNEL_ROOT }}/common" >> $GITHUB_ENV
          echo "✅ OKI source ready" && df -h /

      - name: Sync Kernel Sources (OSS)
        if: matrix.source == 'oss'
        run: |
          mkdir -p "${{ env.KERNEL_ROOT }}" && cd "${{ env.KERNEL_ROOT }}"
          echo "📥 Downloading OnePlus OSS source..."
          aria2c -s16 -x16 -k1M \
            https://github.com/OnePlusOSS/android_kernel_common_oneplus_sm8850/archive/refs/heads/oneplus/sm8850_v_16.0.0_oneplus_15.zip \
            -o common.zip
          unzip -q common.zip
          mv android_kernel_common_oneplus_sm8850-* common
          rm -f common.zip
          echo "KERNEL_DIR=${{ env.KERNEL_ROOT }}/common" >> $GITHUB_ENV
          echo "✅ OnePlus OSS source ready" && df -h /

      - name: Setup xxKSU
        run: |
          cd "${{ env.KERNEL_DIR }}"
          rm -rf KernelSU drivers/kernelsu

          git clone --depth=1 --branch=master \
            https://github.com/backslashxx/KernelSU.git KernelSU

          echo "🔗 Symlinking KernelSU into drivers/kernelsu..."
          ln -sf ../KernelSU/kernel drivers/kernelsu

          grep -q "kernelsu" drivers/Makefile || \
            echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          grep -q "kernelsu" drivers/Kconfig || \
            sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig

          KSU_COMMIT=$(git -C KernelSU log -1 --format='%h')
          echo "KSU_COMMIT=$KSU_COMMIT" >> $GITHUB_ENV
          echo "KSU_COMMIT_MSG=$(git -C KernelSU log -1 --format='%s')" >> $GITHUB_ENV

      - name: Collect xxKSU Version
        id: ksu
        run: |
          git clone --depth=1 "${{ env.SCRIPTS_REPO }}" sh

          KSU_VER=$(./sh/get_ksuver.sh "backslashxx" "KernelSU" "${{ env.KSU_BRANCH }}" \
            || echo "unknown")

          echo "ksu_ver=${KSU_VER}" >> "$GITHUB_OUTPUT"
          echo "KSU_VERSION=${KSU_VER}" >> "$GITHUB_ENV"
          echo "xxKSU ver  : r${KSU_VER}"

      - name: Apply Patches & Source Fixes
        run: |
          cd "${{ env.KERNEL_DIR }}"

          # 0. Bypass GKI ABI symbol checks
          echo "🚫 Removing GKI protected exports..."
          rm -f android/abi_gki_protected_exports_* || true

          # 1. Spoof scripts/mkcompile_h
          sed -i \
            's|"${LINUX_COMPILE_BY}"|"kleaf"|g;
             s|"${LINUX_COMPILE_HOST}"|"build-host"|g;
             s|"${CC_VERSION}, ${LD_VERSION}"|"Android (14043575, +pgo, +bolt, +lto, +mlgo, based on r536225) clang version 19.0.1 (https://android.googlesource.com/toolchain/llvm-project b3a530ec6537146650e42be89f1089e9a3588460), LLD 19.0.1"|g' \
            scripts/mkcompile_h
          echo "✅ mkcompile_h spoofed"

          # 2. Spoof scripts/setlocalversion — no-op
          cat > scripts/setlocalversion << 'SETLOCALVERSION_EOF'
          #!/bin/sh
          echo ""
          SETLOCALVERSION_EOF
          chmod +x scripts/setlocalversion
          echo "✅ setlocalversion spoofed"

          # 3. Spoof init/Makefile timestamp
          sed -i \
            's|^build-version = .*|build-version = 1|;
             s|^build-timestamp = .*|build-timestamp = "Fri Sep 12 04:57:41 UTC 2025"|' \
            init/Makefile
          echo "✅ init/Makefile timestamp spoofed"

          # 4. Fix libbpf.c type cast compilation error
          echo "🔧 Patching libbpf.c..."
          sed -i 's/next_path = strchr(s, '"'"':'"'"');/next_path = (char *)strchr(s, '"'"':'"'"');/' \
            tools/lib/bpf/libbpf.c || true

      - name: Configure Kernel
        run: |
          cd "${{ env.KERNEL_DIR }}"
          export ARCH=arm64
          export CROSS_COMPILE="${{ env.ARM64_TOOLCHAIN }}"
          export CROSS_COMPILE_COMPAT="${{ env.ARM32_TOOLCHAIN }}"

          make ARCH=arm64 LLVM=1 LLVM_IAS=1 LD=ld.lld O=out gki_defconfig

          cat << 'EOF' >> out/.config
          CONFIG_ARCH_QCOM=y
          CONFIG_CPU_FREQ=y
          CONFIG_CPU_FREQ_GOV_SCHEDUTIL=y
          CONFIG_THERMAL=y
          CONFIG_CMA=y
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          CONFIG_IP_NF_TARGET_TTL=y
          CONFIG_IP6_NF_TARGET_HL=y
          CONFIG_IP6_NF_MATCH_HL=y
          CONFIG_TCP_CONG_ADVANCED=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_NET_SCH_FQ=y
          CONFIG_TCP_CONG_BIC=n
          CONFIG_TCP_CONG_WESTWOOD=n
          CONFIG_TCP_CONG_HTCP=n
          CONFIG_DEFAULT_BBR=y
          CONFIG_BPF_STREAM_PARSER=y
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
          CONFIG_NETFILTER_XT_SET=y
          CONFIG_IP_SET=y
          CONFIG_IP_SET_MAX=65534
          CONFIG_IP_SET_BITMAP_IP=y
          CONFIG_IP_SET_BITMAP_IPMAC=y
          CONFIG_IP_SET_BITMAP_PORT=y
          CONFIG_IP_SET_HASH_IP=y
          CONFIG_IP_SET_HASH_IPMARK=y
          CONFIG_IP_SET_HASH_IPPORT=y
          CONFIG_IP_SET_HASH_IPPORTIP=y
          CONFIG_IP_SET_HASH_IPPORTNET=y
          CONFIG_IP_SET_HASH_IPMAC=y
          CONFIG_IP_SET_HASH_MAC=y
          CONFIG_IP_SET_HASH_NETPORTNET=y
          CONFIG_IP_SET_HASH_NET=y
          CONFIG_IP_SET_HASH_NETNET=y
          CONFIG_IP_SET_HASH_NETPORT=y
          CONFIG_IP_SET_HASH_NETIFACE=y
          CONFIG_IP_SET_LIST_SET=y
          CONFIG_IP6_NF_NAT=y
          CONFIG_IP6_NF_TARGET_MASQUERADE=y
          CONFIG_LTO_CLANG_THIN=y
          CONFIG_NET_SCH_CAKE=y
          CONFIG_KSU=y
          CONFIG_KSU_EXTRAS=y
          CONFIG_KSU_ALLOWLIST_WORKAROUND=n
          CONFIG_KSU_TAMPER_SYSCALL_TABLE=y
          CONFIG_KSU_THRONE_TRACKER_ALWAYS_THREADED=y
          CONFIG_KSU_DEBUG=n
          CONFIG_KSU_KPROBES_HOOK=n
          CONFIG_KSU_LSM_SECURITY_HOOKS=y
          CONFIG_LOCALVERSION="-android16-5-g6928909e3148-abogki444322847-4k"
          CONFIG_DEBUG_INFO_BTF=n
          CONFIG_DEBUG_INFO_BTF_MODULES=n
          EOF

          make ARCH=arm64 LLVM=1 LLVM_IAS=1 LD=ld.lld O=out olddefconfig

      - name: Build Kernel
        run: |
          cd "${{ env.KERNEL_DIR }}"
          export ARCH=arm64
          export CROSS_COMPILE="${{ env.ARM64_TOOLCHAIN }}"
          export CROSS_COMPILE_COMPAT="${{ env.ARM32_TOOLCHAIN }}"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CC="ccache clang"
          export CXX="ccache clang++"

          START_TIME=$SECONDS

          if [ "${{ github.event.inputs.force_clean_build }}" = "true" ]; then
            make -j$(nproc) LLVM=1 LLVM_IAS=1 LD=ld.lld O=out clean
          fi

          make -j$(nproc) \
            LLVM=1 LLVM_IAS=1 \
            ARCH=arm64 \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE="${{ env.ARM64_TOOLCHAIN }}" \
            CROSS_COMPILE_COMPAT="${{ env.ARM32_TOOLCHAIN }}" \
            CC="$CC" \
            KCFLAGS="-fno-stack-protector" \
            LD=ld.lld \
            HOSTLD=ld.lld \
            O=out

          echo "BUILD_TIME=$((SECONDS - START_TIME))s" >> $GITHUB_ENV
          echo "✅ Build complete in $((SECONDS - START_TIME))s"

      - name: Show ccache Stats
        run: ccache -s | grep -E "(Hits|Misses|Hit rate|cache size)" || true

      - name: Package Kernel (AnyKernel3)
        run: |
          KERNEL_VERSION="${{ github.event.inputs.kernel_version }}.${{ github.event.inputs.sub_level }}"
          SOURCE_UPPER=$(echo "${{ matrix.source }}" | tr '[:lower:]' '[:upper:]')

          git clone --depth=1 --branch=gki-2.0 \
            https://github.com/WildKernels/AnyKernel3 AnyKernel3

          sed -i "s|kernel.string=.*|kernel.string=${SOURCE_UPPER} ${KERNEL_VERSION} - xxKSU r${{ env.KSU_VERSION }} for popsicle|" \
            AnyKernel3/anykernel.sh

          cp "${{ env.KERNEL_DIR }}/out/arch/arm64/boot/Image" AnyKernel3/
          [ -f "${{ env.KERNEL_DIR }}/out/arch/arm64/boot/dtb" ] && \
            cp "${{ env.KERNEL_DIR }}/out/arch/arm64/boot/dtb" AnyKernel3/ || true

          cd AnyKernel3 && rm -rf .git .github
          ZIP_NAME="AK3-${{ matrix.source }}-${KERNEL_VERSION}-popsicle-xxksu-r${{ env.KSU_VERSION }}.zip"
          zip -r9 "../$ZIP_NAME" .
          cd ..

          echo "KERNEL_ZIP=$ZIP_NAME" >> $GITHUB_ENV
          echo "✅ Packaged: $ZIP_NAME"

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: kernel-popsicle-${{ matrix.source }}-xxksu-${{ github.run_number }}
          path: ${{ env.KERNEL_ZIP }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event.inputs.create_release == 'true'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: kernel-popsicle-*-xxksu-${{ github.run_number }}
          merge-multiple: true
          path: zips

      - name: Create GitHub Release
        run: |
          KERNEL_VERSION="${{ github.event.inputs.kernel_version }}.${{ github.event.inputs.sub_level }}"

          RELEASE_NOTES="**Build Date:** $(date -u '+%Y-%m-%d %H:%M UTC')
          **Device:** Xiaomi 17 Pro Max (popsicle)
          **SoC:** Snapdragon 8 Elite Gen 5 (SM8850-AC)
          **Kernel Sources:** ${{ github.event.inputs.kernel_source }}
          **Kernel:** ${{ github.event.inputs.android_version }}-${{ github.event.inputs.kernel_version }} (${KERNEL_VERSION} / ${{ github.event.inputs.os_patch_level }})
          **KernelSU:** xxKSU
          **SuSFS:** None

          Flash ZIP in Kernel Flasher or extract Image to patch boot.img manually."

          gh release create "popsicle-xxksu-${{ github.run_number }}" \
            --title "popsicle xxKSU ${KERNEL_VERSION} Build #${{ github.run_number }}" \
            --notes "$RELEASE_NOTES" \
            --repo "${{ github.repository }}" \
            zips/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
